<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>CEE Medico Nepal | Complete Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
  </script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#0ea5e9;
--secondary:#3b82f6;
--background:#f0f9ff;
--card-bg:#ffffff;
--text-dark:#0c4a6e;
--text-muted:#64748b;
--radius:18px;
--sidebar-width:280px;
--sidebar-collapsed:80px;
}

body{
background:var(--background);
overflow-x:hidden;
}

.dashboard{
display:flex;
min-height:100vh;
}

.sidebar{
width:var(--sidebar-width);
background:rgba(255,255,255,0.96);
backdrop-filter:blur(12px);
box-shadow:4px 0 24px rgba(0,0,0,0.03);
position:fixed;
height:100vh;
z-index:100;
border-right:1px solid rgba(14,165,233,0.1);
overflow-y:auto;
transition:0.3s;
}

.sidebar.collapsed{
width:var(--sidebar-collapsed);
}

.sidebar.collapsed .nav-label,
.sidebar.collapsed .logo-text{
display:none;
}

.sidebar.collapsed .nav-item{
justify-content:center;
}

.logo-area{
padding:1.7rem;
display:flex;
align-items:center;
gap:12px;
border-bottom:1px solid #eef2ff;
}

.logo-icon{
font-size:2rem;
color:var(--primary);
}

.logo-text{
font-weight:800;
font-size:1.3rem;
color:var(--primary);
}

.nav-item{
display:flex;
align-items:center;
gap:14px;
padding:14px 18px;
margin:8px 12px;
border-radius:16px;
cursor:pointer;
transition:0.2s;
font-weight:600;
color:var(--text-dark);
}

.nav-item:hover,
.nav-item.active{
background:#e0f2fe;
color:var(--primary);
}

.main-content{
flex:1;
margin-left:var(--sidebar-width);
padding:24px;
transition:0.3s;
}

.sidebar.collapsed ~ .main-content{
margin-left:var(--sidebar-collapsed);
}

.top-nav{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.75);
padding:14px 22px;
border-radius:40px;
margin-bottom:26px;
}

.user-greeting{
background:white;
padding:8px 18px;
border-radius:40px;
font-weight:600;
}

.stat-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:28px;
}

.stat-card{
background:white;
padding:24px;
border-radius:24px;
border:1px solid rgba(14,165,233,0.08);
transition:0.2s;
}

.stat-card:hover{
transform:translateY(-3px);
}

.stat-card i{
font-size:2rem;
color:var(--primary);
margin-bottom:14px;
}

.stat-number{
font-size:2rem;
font-weight:800;
margin-bottom:6px;
}

.subject-accordion{
background:white;
border-radius:24px;
margin-bottom:16px;
overflow:hidden;
}

.subject-header{
padding:18px 22px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
background:#fafcff;
}

.chapter-list{
display:none;
padding:18px;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:18px;
}

.chapter-card{
background:white;
padding:18px;
border-radius:20px;
border:1px solid #e2e8f0;
transition:0.2s;
}

.chapter-card:hover{
transform:translateY(-3px);
border-color:var(--primary);
}

.btn-sm{
background:var(--primary);
color:white;
border:none;
padding:10px 16px;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.pdf-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:flex;
justify-content:center;
align-items:center;
z-index:5000;
backdrop-filter:blur(5px);
}

.pdf-box{
background:white;
width:92%;
max-width:1100px;
height:90vh;
border-radius:30px;
padding:18px;
}

.pdf-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.pdf-close{
border:none;
background:#ef4444;
color:white;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
}

iframe{
border:none;
border-radius:20px;
}

.option-btn{
background:#f8fafc;
padding:14px 18px;
border-radius:14px;
margin:10px 0;
cursor:pointer;
border:1px solid #e2e8f0;
transition:0.2s;
}

.option-btn:hover{
background:#e0f2fe;
border-color:var(--primary);
}

.correct-feedback{
background:#dcfce7;
padding:12px;
border-radius:14px;
margin-top:14px;
color:#166534;
}

.wrong-feedback{
background:#fee2e2;
padding:12px;
border-radius:14px;
margin-top:14px;
color:#991b1b;
}

@media(max-width:768px){

.sidebar{
transform:translateX(-100%);
}

.sidebar.mobile-open{
transform:translateX(0);
}

.main-content{
margin-left:0 !important;
padding:16px;
}

}

</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar" id="sidebar">

<div class="logo-area">
<i class="fas fa-stethoscope logo-icon"></i>
<span class="logo-text">CEE Medico</span>
</div>

<nav style="margin-top:20px;">

<div class="nav-item active" data-section="dashboard">
<i class="fas fa-home"></i>
<span class="nav-label">Dashboard</span>
</div>

<div class="nav-item" data-section="notes">
<i class="fas fa-book-open"></i>
<span class="nav-label">Notes Library</span>
</div>

<div class="nav-item" data-section="mcq">
<i class="fas fa-brain"></i>
<span class="nav-label">MCQ Practice</span>
</div>

<div class="nav-item" data-section="mock">
<i class="fas fa-chart-line"></i>
<span class="nav-label">Mock Tests</span>
</div>

<div class="nav-item" data-section="favorites">
<i class="fas fa-heart"></i>
<span class="nav-label">Favorites</span>
</div>

<div class="nav-item" data-section="settings">
<i class="fas fa-cog"></i>
<span class="nav-label">Settings</span>
</div>

<div class="nav-item" id="logoutBtn">
<i class="fas fa-sign-out-alt"></i>
<span class="nav-label">Logout</span>
</div>

</nav>

</aside>

<div class="main-content">

<div class="top-nav">

<button id="mobileMenuToggle"
style="border:none;background:none;font-size:1.3rem;display:none;">
<i class="fas fa-bars"></i>
</button>

<div class="user-greeting" id="userGreeting">
Loading...
</div>

<div>
<i class="fas fa-bell" style="color:var(--primary)"></i>
</div>

</div>

<div id="dynamicPanel"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "firebase/app";

import {
getAuth,
signOut,
onAuthStateChanged
} from "firebase/auth";

import {
getDatabase,
ref,
get,
update,
onValue
} from "firebase/database";

 const firebaseConfig = {
    apiKey: "AIzaSyDfCO-xxHPpgSfE-I6KTmsw35Lo9n2v56s",
    authDomain: "live-quiz-6e77b.firebaseapp.com",
    databaseURL: "https://live-quiz-6e77b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "live-quiz-6e77b",
    storageBucket: "live-quiz-6e77b.firebasestorage.app",
    messagingSenderId: "50057610341",
    appId: "1:50057610341:web:d4e88673a20757d4c9328c"
  };


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let currentUser = null;

let currentSection = 'dashboard';

let notesLibrary = {};

const mcqBank = {

"Physics": {

"Rotational Dynamics": [

{
question:"Moment of inertia depends on:",
options:["Mass only","Mass distribution & axis","Velocity","Angular speed"],
answer:1,
explanation:"Moment of inertia depends on mass distribution and axis."
}

]

}

};

async function validateDeviceSession(uid){

const deviceId =
localStorage.getItem('device_uid') ||
(() => {

let id = 'dev_' + Math.random().toString(36).substr(2,10);

localStorage.setItem('device_uid',id);

return id;

})();

const sessionsRef = ref(db, `sessions/${uid}`);

const snap = await get(sessionsRef);

let sessions = snap.exists() ? snap.val() : {};

let found = false;

for(let k in sessions){

if(sessions[k].deviceId === deviceId){
found = true;
}

}

if(!found && Object.keys(sessions).length >= 2){

await signOut(auth);

alert("Maximum 2 active devices allowed");

window.location.href='index.html';

return false;

}

return true;

}

function loadRealtimeNotes(){

const notesRef = ref(db,'notes');

onValue(notesRef,(snapshot)=>{

notesLibrary = {};

if(snapshot.exists()){

snapshot.forEach((child)=>{

const note = child.val();

if(!notesLibrary[note.class]){
notesLibrary[note.class] = {};
}

if(!notesLibrary[note.class][note.subject]){
notesLibrary[note.class][note.subject] = [];
}

notesLibrary[note.class][note.subject].push({

id:child.key,
title:note.topic,
downloads:note.downloads || 0,
preview:note.pdfUrl

});

});

}

if(currentSection === 'notes'){
renderNotesLibrary();
}

if(currentSection === 'dashboard'){
renderDashboardHome(
currentUser?.displayName ||
currentUser?.email?.split('@')[0] ||
"Medico"
);
}

});

}

function renderDashboardHome(userName){

let totalNotesCount = 0;
let totalDownloads = 0;
let totalSubjects = 0;

for(let c in notesLibrary){

for(let s in notesLibrary[c]){

totalSubjects++;

totalNotesCount += notesLibrary[c][s].length;

notesLibrary[c][s].forEach(n=>{
totalDownloads += n.downloads || 0;
});

}

}

let totalMcqs = 0;

for(let sub in mcqBank)
for(let chap in mcqBank[sub])
totalMcqs += mcqBank[sub][chap].length;

const html = `

<div class="stat-grid">

<div class="stat-card">
<i class="fas fa-book-open"></i>
<div class="stat-number">${totalNotesCount}+</div>
<div>Premium Notes</div>
</div>

<div class="stat-card">
<i class="fas fa-layer-group"></i>
<div class="stat-number">${totalSubjects}</div>
<div>Subjects</div>
</div>

<div class="stat-card">
<i class="fas fa-download"></i>
<div class="stat-number">${totalDownloads}+</div>
<div>Total Downloads</div>
</div>

<div class="stat-card">
<i class="fas fa-brain"></i>
<div class="stat-number">${totalMcqs}+</div>
<div>MCQs</div>
</div>

</div>

<div class="stat-card">

<h2 style="margin-bottom:12px;">
Welcome, ${userName}
</h2>

<p>
Continue your CEE preparation with premium notes,
MCQs, and mock tests.
</p>

</div>

`;

document.getElementById('dynamicPanel').innerHTML = html;

}

function renderNotesLibrary(){

let html = `

<div>

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
flex-wrap:wrap;
gap:12px;
">

<h2 style="font-size:2rem;font-weight:800;">
<i class="fas fa-book-open"></i>
Notes Library
</h2>

<input
type="text"
id="noteSearch"
placeholder="Search notes..."
style="
padding:12px 18px;
border-radius:16px;
border:1px solid #cbd5e1;
min-width:260px;
"
>

</div>

`;

for(let className in notesLibrary){

html += `

<div class="subject-accordion">

<div class="subject-header">

<span>
<i class="fas fa-folder-open"></i>
${className}
</span>

<i class="fas fa-chevron-down"></i>

</div>

<div class="chapter-list">

`;

for(let subject in notesLibrary[className]){

html += `

<div style="margin-bottom:28px;">

<h3 style="
font-size:1.2rem;
margin-bottom:16px;
color:var(--primary);
">
${subject}
</h3>

<div style="
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:18px;
">

`;

notesLibrary[className][subject].forEach(ch=>{

html += `

<div class="chapter-card">

<div style="
display:flex;
gap:14px;
">

<div style="
width:55px;
height:55px;
border-radius:18px;
background:#fee2e2;
display:flex;
align-items:center;
justify-content:center;
color:red;
font-size:22px;
">

<i class="fas fa-file-pdf"></i>

</div>

<div>

<h4 style="margin-bottom:8px;">
${ch.title}
</h4>

<div style="
font-size:14px;
color:#64748b;
">

📥 ${ch.downloads} downloads

</div>

</div>

</div>

<div style="
display:flex;
gap:10px;
margin-top:18px;
">

<button
class="preview-pdf btn-sm"
data-preview="${ch.preview}"
data-id="${ch.id}"
>

<i class="fas fa-eye"></i>
Preview

</button>

<a
href="${ch.preview}"
target="_blank"
style="text-decoration:none;"
>

<button class="btn-sm">

<i class="fas fa-arrow-up-right-from-square"></i>
Open

</button>

</a>

</div>

</div>

`;

});

html += `</div></div>`;

}

html += `</div></div>`;

}

html += `</div>`;

document.getElementById('dynamicPanel').innerHTML = html;

document.querySelectorAll('.subject-header').forEach(header=>{

header.addEventListener('click',()=>{

const list = header.nextElementSibling;

list.style.display =
list.style.display === 'grid'
? 'none'
: 'grid';

});

});

document.querySelectorAll('.preview-pdf').forEach(btn=>{

btn.addEventListener('click', async()=>{

const url = btn.dataset.preview;

const id = btn.dataset.id;

openPDFModal(url);

try{

const noteRef = ref(db, `notes/${id}`);

const snapshot = await get(noteRef);

if(snapshot.exists()){

const current = snapshot.val().downloads || 0;

await update(noteRef,{
downloads:current + 1
});

}

}catch(err){
console.log(err);
}

});

});

document.getElementById('noteSearch')
?.addEventListener('input',(e)=>{

const value = e.target.value.toLowerCase();

document.querySelectorAll('.chapter-card').forEach(card=>{

const text = card.innerText.toLowerCase();

card.style.display =
text.includes(value)
? 'block'
: 'none';

});

});

}

function openPDFModal(url){

const html = `

<div class="pdf-modal" id="pdfModal">

<div class="pdf-box">

<div class="pdf-header">

<h2>
<i class="fas fa-book-open"></i>
PDF Viewer
</h2>

<button class="pdf-close" id="closePdfModal">
Close
</button>

</div>

<iframe
src="${url}"
width="100%"
height="92%"
allow="autoplay"
></iframe>

</div>

</div>

`;

document.body.insertAdjacentHTML('beforeend', html);

document.getElementById('closePdfModal')
?.addEventListener('click',()=>{

document.getElementById('pdfModal')?.remove();

});

}

function renderMCQPanel(){

document.getElementById('dynamicPanel').innerHTML = `

<div class="stat-card">

<h2 style="margin-bottom:18px;">
MCQ Practice
</h2>

<div id="mcqContainer"></div>

</div>

`;

loadMCQ();

}

function loadMCQ(){

const q = mcqBank["Physics"]["Rotational Dynamics"][0];

let html = `

<h3>${q.question}</h3>

`;

q.options.forEach((opt,idx)=>{

html += `
<div class="option-btn" data-id="${idx}">
${opt}
</div>
`;

});

html += `<div id="feedback"></div>`;

document.getElementById('mcqContainer').innerHTML = html;

document.querySelectorAll('.option-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

const selected = parseInt(btn.dataset.id);

if(selected === q.answer){

document.getElementById('feedback').innerHTML = `
<div class="correct-feedback">
Correct! ${q.explanation}
</div>
`;

}else{

document.getElementById('feedback').innerHTML = `
<div class="wrong-feedback">
Wrong! ${q.explanation}
</div>
`;

}

});

});

}

function renderMockTests(){

document.getElementById('dynamicPanel').innerHTML = `

<div class="stat-card">

<h2>Mock Tests</h2>

<p style="margin-top:12px;">
Coming soon...
</p>

</div>

`;

}

function renderFavorites(){

document.getElementById('dynamicPanel').innerHTML = `

<div class="stat-card">

<h2>Favorites</h2>

<p style="margin-top:12px;">
Favorite notes feature coming soon.
</p>

</div>

`;

}

function renderSettings(){

document.getElementById('dynamicPanel').innerHTML = `

<div class="stat-card">

<h2>Settings</h2>

<p style="margin-top:12px;">
Dark mode & profile settings coming soon.
</p>

</div>

`;

}

function loadSection(section){

currentSection = section;

if(section === 'dashboard'){

renderDashboardHome(
currentUser?.displayName ||
currentUser?.email?.split('@')[0] ||
"Medico"
);

}

else if(section === 'notes'){
renderNotesLibrary();
}

else if(section === 'mcq'){
renderMCQPanel();
}

else if(section === 'mock'){
renderMockTests();
}

else if(section === 'favorites'){
renderFavorites();
}

else if(section === 'settings'){
renderSettings();
}

document.querySelectorAll('.nav-item')
.forEach(el=>el.classList.remove('active'));

document.querySelector(
`.nav-item[data-section="${section}"]`
)?.classList.add('active');

}

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href='index.html';

return;

}

currentUser = user;

const isValid = await validateDeviceSession(user.uid);

if(!isValid) return;

const userRef = ref(db, `users/${user.uid}`);

const snap = await get(userRef);

let userName =
user.displayName ||
(snap.exists()
? snap.val().name
: user.email.split('@')[0]);

document.getElementById('userGreeting').innerHTML = `
<i class="fas fa-user-circle"></i>
${userName}
`;

loadRealtimeNotes();

loadSection('dashboard');

});

document.querySelectorAll('.nav-item[data-section]')
.forEach(el=>{

el.addEventListener('click',()=>{

loadSection(el.dataset.section);

});

});

document.getElementById('logoutBtn')
?.addEventListener('click', async()=>{

await signOut(auth);

window.location.href='index.html';

});

document.getElementById('mobileMenuToggle')
?.addEventListener('click',()=>{

document.getElementById('sidebar')
.classList.toggle('mobile-open');

});

window.onload = ()=>{

if(window.innerWidth < 768){

document.getElementById('mobileMenuToggle')
.style.display='block';

}

};

</script>

</body>
</html>
