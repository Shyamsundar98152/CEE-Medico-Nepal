<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CEE Medico Nepal | Premium Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
  </script>

  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --secondary: #3b82f6;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --radius: 16px;
      --sidebar-width: 280px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--background);
      color: var(--text-dark);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Layout Structure */
    .dashboard-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--card-bg);
      border-right: 1px solid rgba(0,0,0,0.05);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1000;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .logo-section {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    .logo-section i {
      font-size: 24px;
      color: var(--primary);
      background: #e0f2fe;
      padding: 10px;
      border-radius: 12px;
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
      color: var(--text-dark);
    }

    .nav-menu {
      padding: 16px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 500;
      transition: var(--transition);
      text-decoration: none;
    }

    .nav-item:hover, .nav-item.active {
      background: #f1f5f9;
      color: var(--primary);
    }

    .nav-item.active {
      background: #e0f2fe;
      color: var(--primary);
      font-weight: 600;
    }

    .logout-item {
      margin-top: auto;
      border-top: 1px solid #f1f5f9;
      padding-top: 16px;
      color: #ef4444;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      transition: var(--transition);
      min-width: 0; /* Prevents flex items from overflowing */
    }

    header {
      height: 70px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .page-container {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Cards & Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid #f1f5f9;
    }

    .stat-card i {
      color: var(--primary);
      margin-bottom: 12px;
      display: block;
      font-size: 20px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      display: block;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* Accordion Styles */
    .subject-group {
      margin-bottom: 16px;
      border-radius: var(--radius);
      background: white;
      border: 1px solid #f1f5f9;
      overflow: hidden;
    }

    .subject-trigger {
      width: 100%;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .subject-content {
      display: none;
      padding: 0 20px 20px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .note-card {
      padding: 16px;
      border: 1px solid #f1f5f9;
      border-radius: 12px;
      background: #f8fafc;
      transition: var(--transition);
    }

    .note-card:hover {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      font-size: 0.875rem;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }

    /* Search Bar */
    .search-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .search-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-input {
      width: 100%;
      padding: 14px 14px 14px 48px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      outline: none;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
    }

    /* PDF Modal */
    .pdf-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .pdf-container {
      background: white;
      width: 100%;
      height: 90vh;
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .pdf-header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f1f5f9;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* Mobile Adaptations */
    #menuBtn {
      display: none;
      background: #f1f5f9;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    @media (max-width: 1024px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
      #menuBtn {
        display: block;
      }
      .sidebar-overlay.visible {
        display: block;
      }
      .pdf-container {
        height: 100vh;
        border-radius: 0;
      }
    }

    @media (max-width: 640px) {
      .page-container { padding: 16px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 12px; }
      .subject-content { grid-template-columns: 1fr; }
      .logo-text { font-size: 1.1rem; }
    }
  </style>
</head>

<body>

<div class="dashboard-layout">
  <!-- Sidebar Overlay for mobile -->
  <div class="sidebar-overlay" id="overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-section">
      <i class="fas fa-user-md"></i>
      <span class="logo-text">CEE Medico</span>
    </div>

    <nav class="nav-menu">
      <div class="nav-item active" data-section="home">
        <i class="fas fa-th-large"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" data-section="notes">
        <i class="fas fa-book-open"></i>
        <span>Notes Library</span>
      </div>
      <div class="nav-item" data-section="mock">
        <i class="fas fa-vial"></i>
        <span>Mock Tests</span>
      </div>
      <div class="nav-item" data-section="favorites">
        <i class="fas fa-bookmark"></i>
        <span>Saved Notes</span>
      </div>

      <div class="nav-item logout-item" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Log Out</span>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header>
      <div style="display:flex; align-items:center; gap:12px;">
        <button id="menuBtn"><i class="fas fa-bars"></i></button>
        <h2 id="pageTitle" style="font-size: 1.25rem; font-weight: 700;">Dashboard</h2>
      </div>
      <div id="userInfo" style="display: flex; align-items: center; gap:10px;">
        <span id="userName" style="font-weight: 600; font-size: 0.9rem;">Loading...</span>
        <div style="width: 35px; height: 35px; border-radius: 50%; background: #e0f2fe; display: flex; align-items: center; justify-content: center; color: var(--primary);">
          <i class="fas fa-user"></i>
        </div>
      </div>
    </header>

    <div class="page-container" id="pageContent">
      <!-- Content loaded dynamically here -->
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get, update, onValue } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyDfCO-xxHPpgSfE-I6KTmsw35Lo9n2v56s",
    authDomain: "live-quiz-6e77b.firebaseapp.com",
    databaseURL: "https://live-quiz-6e77b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "live-quiz-6e77b",
    storageBucket: "live-quiz-6e77b.firebasestorage.app",
    messagingSenderId: "50057610341",
    appId: "1:50057610341:web:d4e88673a20757d4c9328c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let notesData = {};

// Mobile Sidebar Logic
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const menuBtn = document.getElementById('menuBtn');

function toggleSidebar() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible');
}

menuBtn.onclick = toggleSidebar;
overlay.onclick = toggleSidebar;

// Router
function navigate(section) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const activeItem = document.querySelector(`[data-section="${section}"]`);
  if(activeItem) activeItem.classList.add('active');

  const titleEl = document.getElementById('pageTitle');
  if(window.innerWidth <= 1024) toggleSidebar();

  switch(section) {
    case 'home':
      titleEl.innerText = "Dashboard";
      renderHome();
      break;
    case 'notes':
      titleEl.innerText = "Notes Library";
      renderNotes();
      break;
    case 'mock':
      titleEl.innerText = "Mock Tests";
      renderPlaceholder("Mock Tests", "Full-length CEE model tests are being prepared. Check back soon!");
      break;
    case 'favorites':
      titleEl.innerText = "Saved Notes";
      renderPlaceholder("Saved Notes", "You haven't saved any notes yet.");
      break;
  }
}

// Render Functions
function renderHome() {
  let noteCount = 0;
  let subCount = 0;
  Object.keys(notesData).forEach(cls => {
    Object.keys(notesData[cls]).forEach(sub => {
      subCount++;
      noteCount += notesData[cls][sub].length;
    });
  });

  const html = `
    <div class="stats-row">
      <div class="stat-card">
        <i class="fas fa-file-alt"></i>
        <span class="stat-value">${noteCount}</span>
        <span class="stat-label">Total Notes</span>
      </div>
      <div class="stat-card">
        <i class="fas fa-layer-group"></i>
        <span class="stat-value">${subCount}</span>
        <span class="stat-label">Subjects</span>
      </div>
      <div class="stat-card">
        <i class="fas fa-clock"></i>
        <span class="stat-value">Free</span>
        <span class="stat-label">Access Type</span>
      </div>
      <div class="stat-card">
        <i class="fas fa-check-circle"></i>
        <span class="stat-value">Active</span>
        <span class="stat-label">Account Status</span>
      </div>
    </div>
    
    <div class="stat-card" style="margin-top: 24px;">
      <h3 style="margin-bottom: 8px;">Welcome back, ${currentUser?.displayName || 'Medico'}!</h3>
      <p style="color: var(--text-muted); font-size: 0.95rem;">
        You have full access to our premium CEE preparation materials. Start with your favorite subject today.
      </p>
      <button class="btn btn-primary" style="margin-top: 20px;" onclick="navigate('notes')">
        Browse Notes <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  `;
  document.getElementById('pageContent').innerHTML = html;
}

function renderNotes() {
  let html = `
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" class="search-input" id="noteSearch" placeholder="Search by chapter or subject...">
    </div>
  `;

  if(Object.keys(notesData).length === 0) {
    html += `<p style="text-align:center; color:var(--text-muted); padding:40px;">No notes available right now.</p>`;
  }

  for(let className in notesData) {
    for(let subject in notesData[className]) {
      const notes = notesData[className][subject];
      html += `
        <div class="subject-group">
          <button class="subject-trigger">
            <span><i class="fas fa-folder" style="color:var(--primary); margin-right:10px;"></i> ${subject} (${className})</span>
            <i class="fas fa-chevron-down"></i>
          </button>
          <div class="subject-content">
            ${notes.map(note => `
              <div class="note-card">
                <h4 style="font-size: 0.95rem; margin-bottom: 12px; height: 2.5em; overflow: hidden;">${note.title}</h4>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                   <span style="font-size: 0.75rem; color: var(--text-muted);"><i class="fas fa-download"></i> ${note.downloads}</span>
                   <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.75rem;" onclick="viewPDF('${note.preview}', '${note.id}')">
                    View <i class="fas fa-eye"></i>
                   </button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
  }

  document.getElementById('pageContent').innerHTML = html;

  // Accordion Logic
  document.querySelectorAll('.subject-trigger').forEach(btn => {
    btn.onclick = () => {
      const content = btn.nextElementSibling;
      const icon = btn.querySelector('.fa-chevron-down');
      const isOpen = content.style.display === 'grid';
      content.style.display = isOpen ? 'none' : 'grid';
      icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    };
  });

  // Search Logic
  document.getElementById('noteSearch').oninput = (e) => {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll('.note-card').forEach(card => {
      const text = card.innerText.toLowerCase();
      card.closest('.note-card').style.display = text.includes(val) ? 'block' : 'none';
    });
  };
}

function renderPlaceholder(title, msg) {
  document.getElementById('pageContent').innerHTML = `
    <div style="text-align: center; padding: 60px 20px;">
      <div style="font-size: 4rem; color: #e2e8f0; margin-bottom: 20px;"><i class="fas fa-hard-hat"></i></div>
      <h3 style="margin-bottom: 10px;">${title}</h3>
      <p style="color: var(--text-muted);">${msg}</p>
    </div>
  `;
}

// PDF Viewer
window.viewPDF = async (url, id) => {
  const modal = document.createElement('div');
  modal.className = 'pdf-modal';
  modal.innerHTML = `
    <div class="pdf-container">
      <div class="pdf-header">
        <h4 style="font-weight:700;">Document Viewer</h4>
        <button class="btn" style="background:#fee2e2; color:#ef4444;" onclick="this.closest('.pdf-modal').remove()">Close</button>
      </div>
      <iframe src="${url}"></iframe>
    </div>
  `;
  document.body.appendChild(modal);

  // Update download count
  try {
    const noteRef = ref(db, `notes/${id}`);
    const snap = await get(noteRef);
    if(snap.exists()) {
      await update(noteRef, { downloads: (snap.val().downloads || 0) + 1 });
    }
  } catch(e) {}
};

// Auth and Data Fetching
onAuthStateChanged(auth, user => {
  if(!user) {
    window.location.href = 'index.html';
    return;
  }
  currentUser = user;
  document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
  
  // Realtime Notes
  onValue(ref(db, 'notes'), (snapshot) => {
    notesData = {};
    if(snapshot.exists()) {
      snapshot.forEach(child => {
        const note = child.val();
        if(!notesData[note.class]) notesData[note.class] = {};
        if(!notesData[note.class][note.subject]) notesData[note.class][note.subject] = [];
        notesData[note.class][note.subject].push({
          id: child.key,
          title: note.topic,
          downloads: note.downloads || 0,
          preview: note.pdfUrl
        });
      });
    }
    navigate('home');
  });
});

// Event Listeners
document.querySelectorAll('.nav-item[data-section]').forEach(item => {
  item.onclick = () => navigate(item.dataset.section);
});

document.getElementById('logoutBtn').onclick = async () => {
  await signOut(auth);
  window.location.href = 'index.html';
};

window.navigate = navigate;

</script>
</body>
</html>
