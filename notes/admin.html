<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
  }
}
</script>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:16px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#0ea5e9;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword } from "firebase/auth";
import { getDatabase, ref, get } from "firebase/database";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://live-quiz-6e77b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "live-quiz-6e77b",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const msg = document.getElementById("msg");

document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // CHECK ADMIN STATUS
    const adminRef = ref(db, `admins/${user.uid}`);
    const snap = await get(adminRef);

    if (snap.exists()) {
      msg.innerText = "Login Success... Redirecting";
      window.location.href = "admin.html";
    } else {
      msg.innerText = "Access Denied (Not Admin)";
      await auth.signOut();
    }

  } catch (err) {
    msg.innerText = err.message;
  }

});

</script>

</body>
</html>
