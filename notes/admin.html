<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel (Fixed)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
  }
}
</script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f1f5f9;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  padding:25px;
  border-radius:14px;
  width:320px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0ea5e9;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.hidden{display:none;}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#ef4444;
  width:auto;
  padding:8px 12px;
}

.note{
  background:white;
  padding:15px;
  margin-top:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}

.small{
  font-size:13px;
  color:#666;
}

.actions button{
  width:auto;
  margin-left:5px;
}

.edit{background:#facc15;color:black;}
.delete{background:#ef4444;}
</style>
</head>

<body>

<!-- LOGIN UI (only fallback, not main login) -->
<div class="center" id="loadingBox">
  <div class="card">
    <h3>Checking Admin Access...</h3>
    <p id="status">Please wait</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">

<div class="container">

<div class="topbar">
  <h2>Admin Dashboard</h2>
  <button class="logout" id="logoutBtn">Logout</button>
</div>

<hr>

<h3>Add Note</h3>

<input id="className" placeholder="Class">
<input id="subject" placeholder="Subject">
<input id="topic" placeholder="Topic">
<input id="pdfUrl" placeholder="PDF URL">

<button id="addBtn">Add Note</button>

<hr>

<div id="notes"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "firebase/app";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "firebase/auth";

import {
  getDatabase,
  ref,
  set,
  push,
  get,
  onValue,
  remove,
  update
} from "firebase/database";


// 🔥 YOUR FIREBASE CONFIG (UNCHANGED)
const firebaseConfig = {
  apiKey: "AIzaSyDfCO-xxHPpgSfE-I6KTmsw35Lo9n2v56s",
  authDomain: "live-quiz-6e77b.firebaseapp.com",
  databaseURL: "https://live-quiz-6e77b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "live-quiz-6e77b",
  storageBucket: "live-quiz-6e77b.firebasestorage.app",
  messagingSenderId: "50057610341",
  appId: "1:50057610341:web:d4e88673a20757d4c9328c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);


// UI
const loadingBox = document.getElementById("loadingBox");
const adminPanel = document.getElementById("adminPanel");
const status = document.getElementById("status");

let currentUser = null;


// 🔐 AUTH + ADMIN CHECK (FIXED CORE LOGIC)
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    status.innerText = "Not logged in. Redirecting...";
    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);
    return;
  }

  currentUser = user;

  status.innerText = "Checking admin permissions...";

  try {

    const snap = await get(ref(db, `admins/${user.uid}`));

    if (!snap.exists()) {
      status.innerText = "Access Denied (Not Admin)";
      await signOut(auth);
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1200);
      return;
    }

    // ✅ ADMIN VERIFIED
    loadingBox.classList.add("hidden");
    adminPanel.classList.remove("hidden");

    loadNotes();

  } catch (e) {
    status.innerText = "Error checking admin";
  }

});


// ➕ ADD NOTE
document.getElementById("addBtn").addEventListener("click", async () => {

  const c = document.getElementById("className").value;
  const s = document.getElementById("subject").value;
  const t = document.getElementById("topic").value;
  const p = document.getElementById("pdfUrl").value;

  if (!c || !s || !t || !p) {
    alert("Fill all fields");
    return;
  }

  const newRef = push(ref(db, "notes"));

  await set(newRef, {
    class: c,
    subject: s,
    topic: t,
    pdfUrl: p,
    downloads: 0,
    createdAt: Date.now()
  });

});


// 📄 LOAD NOTES
function loadNotes() {

  onValue(ref(db, "notes"), (snap) => {

    const notesDiv = document.getElementById("notes");
    notesDiv.innerHTML = "";

    snap.forEach(child => {

      const n = child.val();

      notesDiv.innerHTML += `
        <div class="note">
          <div>
            <b>${n.topic}</b><br>
            <span class="small">${n.class} • ${n.subject}</span>
          </div>

          <div class="actions">
            <button class="edit" onclick="editNote('${child.key}')">Edit</button>
            <button class="delete" onclick="deleteNote('${child.key}')">Delete</button>
          </div>
        </div>
      `;

    });

  });

}


// 🗑 DELETE
window.deleteNote = async (id) => {
  await remove(ref(db, `notes/${id}`));
};


// ✏ EDIT
window.editNote = async (id) => {
  const newTopic = prompt("New Topic:");
  if (!newTopic) return;

  await update(ref(db, `notes/${id}`), {
    topic: newTopic
  });
};


// 🚪 LOGOUT
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});

</script>

</body>
</html>
