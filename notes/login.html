<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CEE Medico Nepal | Unified Access</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDKs (modular) -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0369a1;
      --secondary: #3b82f6;
      --background: #f0f9ff;
      --card-bg: #ffffff;
      --text-dark: #0c4a6e;
      --text-muted: #64748b;
      --accent: #2563eb;
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #e6f4fe 0%, #d9effc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* animated blob background */
    .blob {
      position: fixed;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(14,165,233,0.2) 0%, rgba(59,130,246,0.05) 100%);
      border-radius: 62% 38% 72% 28% / 41% 42% 58% 59%;
      filter: blur(70px);
      z-index: 0;
      animation: float 18s infinite alternate;
    }
    .blob-1 { top: -20%; right: -10%; }
    .blob-2 { bottom: -15%; left: -5%; width: 60vw; height: 60vw; background: radial-gradient(circle, #3b82f620 0%, #0ea5e908 100%); animation-duration: 24s; }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); border-radius: 62% 38% 72% 28% / 41% 42% 58% 59%;}
      100% { transform: translate(4%, 6%) rotate(6deg); border-radius: 48% 52% 35% 65% / 57% 38% 62% 43%;}
    }

    /* glassmorphism card container */
    .auth-unique-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border-radius: var(--radius-xl);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.5);
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .tabs-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1.5rem 2rem 0 2rem;
      background: transparent;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9rem 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 48px;
      transition: all 0.25s;
      font-family: inherit;
      letter-spacing: -0.2px;
    }
    .tab-btn i { margin-right: 8px; }
    .tab-btn.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 6px 14px rgba(14,165,233,0.2);
    }
    .form-panel {
      padding: 2rem 2rem 2.2rem 2rem;
      transition: 0.2s;
    }
    .input-group {
      margin-bottom: 1.25rem;
      position: relative;
    }
    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.1rem;
    }
    input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      font-size: 0.95rem;
      font-weight: 500;
      background: white;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.2);
    }
    .btn-glow {
      width: 100%;
      background: linear-gradient(100deg, var(--primary), var(--secondary));
      border: none;
      padding: 14px;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
      font-family: inherit;
      box-shadow: 0 8px 18px rgba(14,165,233,0.3);
    }
    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(14,165,233,0.4);
    }
    .btn-google {
      background: white;
      color: #1e293b;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      margin-top: 0.8rem;
    }
    .btn-google:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      transform: translateY(-1px);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.2rem 0;
      color: #94a3b8;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e2e8f0;
    }
    .divider span { margin: 0 12px; }
    .info-message {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 1.2rem;
      color: var(--text-muted);
    }
    .forgot-link {
      text-align: right;
      margin-top: -0.5rem;
      margin-bottom: 1rem;
    }
    .forgot-link a {
      font-size: 0.8rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .toast-custom {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      z-index: 200;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      animation: fadeUp 0.3s ease;
      pointer-events: none;
      font-weight: 500;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px);}
      to { opacity: 1; transform: translateX(-50%) translateY(0);}
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; }
    .brand-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .brand-logo i {
      font-size: 2.4rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-logo span {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0c4a6e, #0ea5e9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    @media (max-width: 520px) {
      .auth-unique-container { max-width: 95%; }
      .form-panel { padding: 1.5rem; }
      .tabs-bar { padding: 1.2rem 1rem 0 1rem; }
      .tab-btn { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="auth-unique-container" id="authCard">
  <div class="brand-logo" style="margin-top: 1.2rem;">
    <i class="fas fa-stethoscope"></i>
    <span>CEE Medico Nepal</span>
    <i class="fas fa-graduation-cap"></i>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="login"><i class="fas fa-sign-in-alt"></i> Login</button>
    <button class="tab-btn" data-tab="signup"><i class="fas fa-user-plus"></i> Signup</button>
    <button class="tab-btn" data-tab="forgot"><i class="fas fa-key"></i> Reset</button>
  </div>

  <!-- LOGIN PANEL -->
  <div id="loginPanel" class="form-panel">
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email address" autocomplete="email"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"></div>
    <div class="forgot-link"><a id="switchToForgotBtn">Forgot password?</a></div>
    <button id="doLoginBtn" class="btn-glow"><i class="fas fa-arrow-right-to-bracket"></i> Login to Dashboard</button>
    <button id="googleLoginBtn" class="btn-glow btn-google"><i class="fab fa-google"></i> Continue with Google</button>
    <div class="divider"><span>New to platform?</span></div>
    <div class="info-message">✨ Access 1200+ MCQs & Premium Notes ✨</div>
  </div>

  <!-- SIGNUP PANEL (hidden) -->
  <div id="signupPanel" class="form-panel" style="display: none;">
    <div class="input-group"><i class="fas fa-user"></i><input type="text" id="signupName" placeholder="Full Name" autocomplete="name"></div>
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="signupEmail" placeholder="Email address"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="signupPassword" placeholder="Create password"></div>
    <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="signupConfirm" placeholder="Confirm password"></div>
    <button id="doSignupBtn" class="btn-glow"><i class="fas fa-user-check"></i> Create Account</button>
    <button id="googleSignupBtn" class="btn-glow btn-google"><i class="fab fa-google"></i> Sign up with Google</button>
    <div class="info-message">📚 By joining, you unlock full notes library & mock tests.</div>
  </div>

  <!-- FORGOT PASSWORD PANEL (hidden) -->
  <div id="forgotPanel" class="form-panel" style="display: none;">
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="resetEmail" placeholder="Registered email address"></div>
    <button id="sendResetBtn" class="btn-glow"><i class="fas fa-paper-plane"></i> Send reset link</button>
    <div class="info-message">📩 We'll email a secure link to reset your password.</div>
    <div class="divider"><span>Remember credentials?</span></div>
    <button id="backToLoginBtn" class="btn-glow btn-google" style="background:#f1f5f9; color:#0c4a6e;"><i class="fas fa-chevron-left"></i> Back to Login</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "firebase/auth";
  import { getDatabase, ref, set, get, update } from "firebase/database";

  // ----- FIREBASE CONFIG (EXACT PROVIDED) -----
  const firebaseConfig = {
    apiKey: "AIzaSyDfCO-xxHPpgSfE-I6KTmsw35Lo9n2v56s",
    authDomain: "live-quiz-6e77b.firebaseapp.com",
    databaseURL: "https://live-quiz-6e77b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "live-quiz-6e77b",
    storageBucket: "live-quiz-6e77b.firebasestorage.app",
    messagingSenderId: "50057610341",
    appId: "1:50057610341:web:d4e88673a20757d4c9328c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // ---------- HELPER: DEVICE SESSION MANAGEMENT (2-device limit) ----------
  function getDeviceInfo() {
    let deviceId = localStorage.getItem('device_uid');
    if (!deviceId) {
      deviceId = 'device_' + Math.random().toString(36).substring(2, 12) + Date.now();
      localStorage.setItem('device_uid', deviceId);
    }
    let browser = 'Unknown';
    const ua = navigator.userAgent;
    if (ua.includes('Chrome')) browser = 'Chrome';
    else if (ua.includes('Firefox')) browser = 'Firefox';
    else if (ua.includes('Safari')) browser = 'Safari';
    else if (ua.includes('Edge')) browser = 'Edge';
    return { deviceId, browser, userAgent: ua };
  }

  async function registerDeviceSession(uid) {
    const device = getDeviceInfo();
    const sessionsRef = ref(db, `sessions/${uid}`);
    const snapshot = await get(sessionsRef);
    let sessions = snapshot.exists() ? snapshot.val() : {};
    let existingKey = null;
    for (let key in sessions) {
      if (sessions[key]?.deviceId === device.deviceId) existingKey = key;
    }
    if (existingKey) {
      await update(ref(db, `sessions/${uid}/${existingKey}`), { lastActive: Date.now() });
      return true;
    }
    const activeCount = Object.keys(sessions).length;
    if (activeCount >= 2) {
      throw new Error("MAX_DEVICES: Maximum 2 active devices allowed. Please logout from another device.");
    }
    const newKey = `device_${activeCount + 1}`;
    await set(ref(db, `sessions/${uid}/${newKey}`), { 
      deviceId: device.deviceId, 
      browser: device.browser, 
      lastActive: Date.now(),
      loggedInAt: Date.now()
    });
    return true;
  }

  // UI toast helper
  function showToast(message, isError = false) {
    const existing = document.querySelector('.toast-custom');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-custom';
    toast.style.background = isError ? '#b91c1c' : '#0f3b2c';
    toast.style.color = 'white';
    toast.innerHTML = isError ? `<i class="fas fa-exclamation-circle"></i> ${message}` : `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  function setLoading(button, isLoading, defaultText) {
    if (!button) return;
    if (isLoading) {
      button.disabled = true;
      button.innerHTML = `<span class="spinner"></span> Processing...`;
    } else {
      button.disabled = false;
      button.innerHTML = defaultText;
    }
  }

  // Switch panel UI
  const loginPanel = document.getElementById('loginPanel');
  const signupPanel = document.getElementById('signupPanel');
  const forgotPanel = document.getElementById('forgotPanel');
  const tabs = document.querySelectorAll('.tab-btn');

  function activateTab(tabId) {
    loginPanel.style.display = 'none';
    signupPanel.style.display = 'none';
    forgotPanel.style.display = 'none';
    if (tabId === 'login') loginPanel.style.display = 'block';
    if (tabId === 'signup') signupPanel.style.display = 'block';
    if (tabId === 'forgot') forgotPanel.style.display = 'block';
    tabs.forEach(btn => {
      if(btn.dataset.tab === tabId) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      activateTab(btn.dataset.tab);
    });
  });
  document.getElementById('switchToForgotBtn')?.addEventListener('click', (e) => {
    e.preventDefault();
    activateTab('forgot');
  });
  document.getElementById('backToLoginBtn')?.addEventListener('click', () => {
    activateTab('login');
  });

  // ------------------- LOGIN -------------------
  const loginBtn = document.getElementById('doLoginBtn');
  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if(!email || !password) { showToast("Please fill both fields", true); return; }
    setLoading(loginBtn, true, 'Login to Dashboard');
    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      await registerDeviceSession(userCred.user.uid);
      showToast("Login successful! Redirecting...");
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
    } catch (err) {
      let msg = err.message;
      if (err.message.includes('MAX_DEVICES')) msg = "Maximum 2 active devices allowed. Please logout from another device.";
      else if (err.code === 'auth/invalid-credential') msg = "Invalid email or password.";
      showToast(msg, true);
      setLoading(loginBtn, false, '<i class="fas fa-arrow-right-to-bracket"></i> Login to Dashboard');
    }
  });

  // Google login (shared)
  async function googleAuthFlow(isSignupFlow = false) {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      // check if user document exists in DB
      const userRef = ref(db, `users/${user.uid}`);
      const snap = await get(userRef);
      if(!snap.exists()) {
        await set(userRef, {
          name: user.displayName || user.email.split('@')[0],
          email: user.email,
          createdAt: Date.now(),
          role: 'student'
        });
      }
      await registerDeviceSession(user.uid);
      showToast("Google sign-in success!");
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
    } catch(err) {
      showToast("Google auth failed: " + err.message, true);
    }
  }
  document.getElementById('googleLoginBtn')?.addEventListener('click', () => googleAuthFlow(false));
  document.getElementById('googleSignupBtn')?.addEventListener('click', () => googleAuthFlow(true));

  // ------------------- SIGNUP -------------------
  const signupBtn = document.getElementById('doSignupBtn');
  signupBtn.addEventListener('click', async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    if(!name || !email || !password) { showToast("Please fill all fields", true); return; }
    if(password !== confirm) { showToast("Passwords do not match", true); return; }
    if(password.length < 6) { showToast("Password should be at least 6 characters", true); return; }
    setLoading(signupBtn, true, 'Create Account');
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = userCred.user.uid;
      await set(ref(db, `users/${uid}`), {
        name: name,
        email: email,
        createdAt: Date.now(),
        role: "student"
      });
      await registerDeviceSession(uid);
      showToast("Account created successfully! Redirecting...");
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1400);
    } catch (err) {
      let msg = err.message;
      if(err.code === 'auth/email-already-in-use') msg = "Email already registered. Try login.";
      showToast(msg, true);
      setLoading(signupBtn, false, '<i class="fas fa-user-check"></i> Create Account');
    }
  });

  // ------------------- FORGOT PASSWORD -------------------
  const resetBtn = document.getElementById('sendResetBtn');
  resetBtn.addEventListener('click', async () => {
    const email = document.getElementById('resetEmail').value.trim();
    if(!email) { showToast("Enter your email address", true); return; }
    setLoading(resetBtn, true, 'Send reset link');
    try {
      await sendPasswordResetEmail(auth, email);
      showToast("✅ Reset link sent! Check your inbox.");
      setTimeout(() => activateTab('login'), 2000);
    } catch (err) {
      let msg = "Unable to send reset email. Verify email address.";
      if(err.code === 'auth/user-not-found') msg = "No account found with this email.";
      showToast(msg, true);
    } finally {
      setLoading(resetBtn, false, '<i class="fas fa-paper-plane"></i> Send reset link');
    }
  });

  // optional: redirect if already logged in and tries to visit unified page, but we keep this as entrance.
  onAuthStateChanged(auth, (user) => {
    if (user && window.location.pathname.includes('unified-auth.html') === false && window.location.pathname !== '/') {
      // avoid infinite redirect, but if user is already logged in and visits this exact page? We'll optionally let them stay but they can logout
      // we don't auto-redirect because they might want to switch accounts; but typical behavior: if already logged in, go to dashboard.
      // only redirect if we are on the root login page? For better UX we will not force redirect here but provide floating logout.
      // However best practice: redirect to dashboard if already authenticated.
      const current = window.location.pathname;
      if(current.includes('index') || current === '/' || current.includes('login.html')) {
        // but this file is the single auth hub, we respect it but can provide manual logout? We don't want lock.
        // Option: show a small banner? not required. for smoothness, we redirect to dashboard after 1 sec if already signed in? To avoid confusion, we leave as is.
        // but we add a small notification.
        if(document.querySelector('.toast-custom') === null){
          setTimeout(() => {
            if(auth.currentUser) showToast("Already signed in! Redirecting to dashboard...");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
          }, 200);
        }
      }
    }
  });

  // additional: simple floating device alert simulation
  console.log("Unified Auth Page ready — supports login/signup/reset + 2-device limit");
</script>
</body>
</html>
