    const firebaseConfig = {
      apiKey: "AIzaSyDfCO-xxHPpgSfE-I6KTmsw35Lo9n2v56s",

      messagingSenderId: "50057610341",
      appId: "1:50057610341:web:d4e88673a20757d4c9328c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    window.db = db;
    window.auth = auth;

    // Expose globally for inline scripts
    window.firebaseReady = true;
    window.signOut = signOut;
    window.sendPasswordResetEmail = sendPasswordResetEmail;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
    window.GoogleAuthProvider = GoogleAuthProvider;
    window.signInWithPopup = signInWithPopup;
    window.ref = ref;
    window.set = set;
    window.get = get;
    window.update = update;
    window.onValue = onValue;
    window.child = child;
    window.push = push;

    // Device session management helper (2-device limit)
    window.checkAndRegisterDevice = async (uid, deviceInfo) => {
      const sessionsRef = ref(db, `sessions/${uid}`);
      const snapshot = await get(sessionsRef);
      let sessions = snapshot.exists() ? snapshot.val() : {};
      const deviceId = deviceInfo.deviceId;
      let existingDeviceKey = null;
      for (let key in sessions) {
        if (sessions[key] && sessions[key].deviceId === deviceId) existingDeviceKey = key;
      }
      if (existingDeviceKey) {
        // update lastActive
        await update(ref(db, `sessions/${uid}/${existingDeviceKey}`), { lastActive: Date.now() });
        return { allowed: true };
      }
      const deviceCount = Object.keys(sessions).length;
      if (deviceCount >= 2) {
        return { allowed: false, message: "Maximum 2 active devices allowed. Please logout from another device." };
      }
      const newKey = `device_${deviceCount + 1}`;
      await set(ref(db, `sessions/${uid}/${newKey}`), { ...deviceInfo, lastActive: Date.now() });
      return { allowed: true };
    };

    window.getDeviceInfo = () => {
      let deviceId = localStorage.getItem('device_id');
      if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).substr(2, 16) + '_' + Date.now();
        localStorage.setItem('device_id', deviceId);
      }
      const userAgent = navigator.userAgent;
      let browser = "Unknown";
      if (userAgent.includes("Chrome")) browser = "Chrome";
      else if (userAgent.includes("Firefox")) browser = "Firefox";
      else if (userAgent.includes("Safari")) browser = "Safari";
      else if (userAgent.includes("Edge")) browser = "Edge";
      return { deviceId, browser, userAgent };
    };
  </script>

      document.body.innerHTML = `<div class="min-h-screen flex justify-center items-center"><div class="glass-card p-8 w-96"><h2 class="text-2xl font-bold">Sign Up</h2><input id="name" placeholder="Full Name" class="w-full p-2 my-2 border rounded"><input id="email" placeholder="Email" class="w-full p-2 my-2 border rounded"><input id="password" type="password" placeholder="Password" class="w-full p-2 my-2 border rounded"><button id="signupBtn" class="btn-primary w-full">Create Account</button></div></div>`;
      document.getElementById('signupBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        const name = document.getElementById('name').value;
        try {
          const cred = await window.createUserWithEmailAndPassword(window.auth, email, pwd);
          await window.set(window.ref(window.db, `users/${cred.user.uid}`), { name, email, createdAt: Date.now() });
          window.location.href = 'dashboard.html';
        } catch(e) { alert(e.message); }
      });
    }
    if (window.location.pathname.includes('forgot-password.html')) {
      document.body.innerHTML = `<div class="flex justify-center items-center h-screen"><div class="p-8 bg-white rounded-xl"><h2>Reset Password</h2><input id="resetEmail" class="border p-2 w-full" placeholder="Email"><button id="resetBtn" class="btn-primary mt-3">Send reset link</button></div></div>`;
      document.getElementById('resetBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('resetEmail').value;
        await window.sendPasswordResetEmail(window.auth, email);
        alert("Reset link sent");
      });
    }
  </script>
  <noscript>Enable JavaScript for full platform experience.</noscript>
</body>
</html>
