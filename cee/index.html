<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamPro - Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50">

    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>
    
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 w-64 h-full bg-white border-r z-30 overflow-y-auto">
        <div class="p-6 border-b">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white font-bold">EP</div>
                <span class="font-bold text-xl">ExamPro</span>
            </div>
        </div>
        <nav class="p-4 space-y-1">
            <button onclick="loadDashboard()" id="navDashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all">
                <i class="fas fa-chart-line w-5"></i> Dashboard
            </button>
            <button onclick="loadExams()" id="navExams" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all">
                <i class="fas fa-book-open w-5"></i> Available Exams
            </button>
            <button onclick="loadAttempts()" id="navAttempts" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all">
                <i class="fas fa-history w-5"></i> My Attempts
            </button>
            <button onclick="loadProfile()" id="navProfile" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all">
                <i class="fas fa-user w-5"></i> Profile
            </button>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 transition-all">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 p-8">
        <div id="mainContent" class="max-w-7xl mx-auto">
            <div class="flex items-center justify-center h-64">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <!-- Exam Taking Modal -->
    <div id="examModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto m-4">
            <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
                <h3 id="examModalTitle" class="text-xl font-bold">Start Exam</h3>
                <button onclick="closeExamModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <div id="examModalBody" class="p-6"></div>
        </div>
    </div>

    <!-- Take Exam Interface -->
    <div id="takeExamModal" class="fixed inset-0 bg-white z-50 hidden flex flex-col">
        <div class="sticky top-0 bg-white border-b p-4 shadow-sm z-10">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <h2 id="examTitle" class="text-xl font-bold"></h2>
                <div class="flex items-center gap-4">
                    <div class="bg-gray-100 px-4 py-2 rounded-lg">
                        <span class="text-sm">Time Left:</span>
                        <span id="timerDisplay" class="text-xl font-bold text-blue-600 ml-2 font-mono">00:00</span>
                    </div>
                    <button onclick="submitExam()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-700">Submit</button>
                </div>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-6" id="examQuestionsContainer"></div>
    </div>

    <style>
        .loading-spinner { border: 3px solid #f3f4f6; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .option-card { transition: all 0.2s; cursor: pointer; }
        .option-card.selected { background: #eff6ff; border-color: #3b82f6; border-width: 2px; }
        .question-nav { transition: all 0.2s; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 600; }
        .question-nav.answered { background: #22c55e; color: white; }
        .question-nav.current { background: #3b82f6; color: white; transform: scale(1.05); }
        .active-nav { background: #eff6ff; color: #3b82f6; }
    </style>

    <script>
        const SUPABASE_URL = 'https://rpudsnrqlhataqfavcjh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        let activeExam = null;
        let currentQuestions = [];
        let userAnswers = [];
        let examTimer = null;
        let timeRemaining = 0;
        let currentQuestionIndex = 0;

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = session.user;
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            currentProfile = profile;
            
            if (profile?.role !== 'student') {
                window.location.href = 'admin.html';
                return;
            }
            
            loadDashboard();
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500' };
            toast.className = `toast flex items-center gap-3 px-4 py-3 rounded-lg text-white shadow-lg ${colors[type]} mb-2`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function setActiveNav(navId) {
            ['navDashboard', 'navExams', 'navAttempts', 'navProfile'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (id === navId) el.classList.add('active-nav');
                    else el.classList.remove('active-nav');
                }
            });
        }
        
        async function loadDashboard() {
            setActiveNav('navDashboard');
            document.getElementById('mainContent').innerHTML = `
                <div>
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white mb-8">
                        <h1 class="text-3xl font-bold mb-2">Welcome back, ${currentProfile?.full_name || 'Student'}!</h1>
                        <p class="text-blue-100">Ready to test your knowledge?</p>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="statsGrid">
                        <div class="bg-white rounded-xl p-6 shadow-sm"><div class="animate-pulse h-20 bg-gray-200 rounded"></div></div>
                    </div>
                    
                    <div class="grid lg:grid-cols-2 gap-8">
                        <div class="bg-white rounded-xl p-6 shadow-sm">
                            <h3 class="text-lg font-bold mb-4">Performance Overview</h3>
                            <canvas id="performanceChart" height="250"></canvas>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm">
                            <h3 class="text-lg font-bold mb-4">Recent Activity</h3>
                            <div id="recentActivity" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Load stats
            const { data: attempts } = await supabase
                .from('attempts')
                .select('score, total')
                .eq('user_id', currentUser.id);
            
            const totalAttempts = attempts?.length || 0;
            const avgScore = attempts?.length ? Math.round(attempts.reduce((a,b) => a + (b.score/b.total * 100), 0) / attempts.length) : 0;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="bg-white rounded-xl p-6 shadow-sm"><i class="fas fa-clipboard-list text-2xl text-blue-500 mb-2"></i><p class="text-2xl font-bold">${totalAttempts}</p><p class="text-gray-500">Total Exams</p></div>
                <div class="bg-white rounded-xl p-6 shadow-sm"><i class="fas fa-chart-line text-2xl text-green-500 mb-2"></i><p class="text-2xl font-bold">${avgScore}%</p><p class="text-gray-500">Avg Score</p></div>
                <div class="bg-white rounded-xl p-6 shadow-sm"><i class="fas fa-fire text-2xl text-orange-500 mb-2"></i><p class="text-2xl font-bold">${currentProfile?.streak || 0}</p><p class="text-gray-500">Day Streak</p></div>
                <div class="bg-white rounded-xl p-6 shadow-sm"><i class="fas fa-medal text-2xl text-yellow-500 mb-2"></i><p class="text-2xl font-bold">${currentProfile?.badge || 'Beginner'}</p><p class="text-gray-500">Badge</p></div>
            `;
            
            // Load recent attempts
            const { data: recentAttempts } = await supabase
                .from('attempts')
                .select('*, exam_sessions(title)')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false })
                .limit(5);
            
            const recentHtml = recentAttempts?.map(a => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <div><p class="font-medium">${a.exam_sessions?.title || a.subject}</p><p class="text-xs text-gray-500">${new Date(a.created_at).toLocaleDateString()}</p></div>
                    <div class="text-right"><p class="font-bold ${a.score/a.total * 100 >= 70 ? 'text-green-600' : 'text-red-600'}">${Math.round(a.score/a.total * 100)}%</p><p class="text-xs text-gray-500">${a.score}/${a.total}</p></div>
                </div>
            `).join('') || '<p class="text-gray-500 text-center">No attempts yet</p>';
            
            document.getElementById('recentActivity').innerHTML = recentHtml;
            
            // Chart
            setTimeout(() => {
                const ctx = document.getElementById('performanceChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: { labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], datasets: [{ label: 'Your Score', data: [65, 72, 78, avgScore], borderColor: '#3b82f6', tension: 0.4 }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
                    });
                }
            }, 100);
        }
        
        async function loadExams() {
            setActiveNav('navExams');
            document.getElementById('mainContent').innerHTML = `
                <div>
                    <h1 class="text-2xl font-bold mb-6">📚 Available Exams</h1>
                    <div id="examsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>
            `;
            
            const { data: exams } = await supabase
                .from('exam_sessions')
                .select('*')
                .eq('is_active', true)
                .order('created_at', { ascending: false });
            
            const examsGrid = document.getElementById('examsGrid');
            if (!exams?.length) {
                examsGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">No exams available</div>';
                return;
            }
            
            examsGrid.innerHTML = exams.map(exam => `
                <div class="bg-white rounded-xl p-6 shadow-sm border hover:shadow-md transition">
                    <h3 class="text-lg font-bold mb-2">${exam.title || `${exam.subject} - ${exam.chapter}`}</h3>
                    <div class="flex gap-4 text-sm text-gray-500 mb-4">
                        <span><i class="far fa-clock"></i> ${exam.duration} min</span>
                        <span><i class="far fa-folder"></i> ${exam.subject}</span>
                        <span><i class="fas fa-chapter"></i> ${exam.chapter}</span>
                    </div>
                    <button onclick="startExam('${exam.id}')" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">Start Exam →</button>
                </div>
            `).join('');
        }
        
        async function startExam(examId) {
            const { data: exam } = await supabase
                .from('exam_sessions')
                .select('*')
                .eq('id', examId)
                .single();
            
            if (!exam) return;
            
            const { data: questions } = await supabase
                .from('questions')
                .select('*')
                .eq('subject', exam.subject)
                .limit(10);
            
            if (!questions?.length) {
                showToast('No questions available for this exam', 'error');
                return;
            }
            
            activeExam = exam;
            currentQuestions = questions;
            userAnswers = new Array(questions.length).fill(null);
            timeRemaining = exam.duration * 60;
            currentQuestionIndex = 0;
            
            document.getElementById('examTitle').textContent = exam.title || `${exam.subject} - ${exam.chapter}`;
            document.getElementById('takeExamModal').classList.remove('hidden');
            document.getElementById('takeExamModal').style.display = 'flex';
            
            renderExamQuestion();
            startExamTimer();
        }
        
        function renderExamQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            const container = document.getElementById('examQuestionsContainer');
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm text-gray-500">Question ${currentQuestionIndex + 1} of ${currentQuestions.length}</span>
                        <div class="flex gap-2">
                            ${currentQuestionIndex > 0 ? `<button onclick="previousQuestion()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">← Previous</button>` : ''}
                            ${currentQuestionIndex < currentQuestions.length - 1 ? `<button onclick="nextQuestion()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Next →</button>` : ''}
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 rounded-xl p-6 mb-6">
                        <p class="text-lg font-medium">${q.question}</p>
                    </div>
                    
                    <div class="space-y-3">
                        ${JSON.parse(q.options).map((opt, idx) => `
                            <div onclick="selectAnswer(${idx})" class="option-card p-4 border-2 rounded-xl ${userAnswers[currentQuestionIndex] === idx ? 'selected' : 'border-gray-200'}">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center text-sm font-bold ${userAnswers[currentQuestionIndex] === idx ? 'border-blue-600 bg-blue-600 text-white' : 'border-gray-300'}">
                                        ${String.fromCharCode(65 + idx)}
                                    </div>
                                    <span>${opt}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="grid grid-cols-10 gap-2 mt-8 pt-6 border-t">
                        ${currentQuestions.map((_, idx) => `
                            <button onclick="goToQuestion(${idx})" class="question-nav ${userAnswers[idx] !== null ? 'answered' : 'bg-gray-100'} ${idx === currentQuestionIndex ? 'current' : ''}">
                                ${idx + 1}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function selectAnswer(optionIndex) {
            userAnswers[currentQuestionIndex] = optionIndex;
            renderExamQuestion();
        }
        
        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                renderExamQuestion();
            }
        }
        
        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderExamQuestion();
            }
        }
        
        function goToQuestion(index) {
            currentQuestionIndex = index;
            renderExamQuestion();
        }
        
        function startExamTimer() {
            if (examTimer) clearInterval(examTimer);
            
            examTimer = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(examTimer);
                    submitExam();
                } else {
                    timeRemaining--;
                    const minutes = Math.floor(timeRemaining / 60);
                    const seconds = timeRemaining % 60;
                    document.getElementById('timerDisplay').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        async function submitExam() {
            if (examTimer) clearInterval(examTimer);
            
            let correctCount = 0;
            const answersData = [];
            userAnswers.forEach((answer, idx) => {
                const isCorrect = answer !== null && answer === currentQuestions[idx].answer;
                if (isCorrect) correctCount++;
                answersData.push({
                    question_id: currentQuestions[idx].id,
                    selected: answer,
                    correct: isCorrect
                });
            });
            
            const { error } = await supabase
                .from('attempts')
                .insert({
                    user_id: currentUser.id,
                    exam_session_id: activeExam.id,
                    subject: activeExam.subject,
                    chapter: activeExam.chapter,
                    score: correctCount,
                    total: currentQuestions.length,
                    answers: answersData,
                    time_taken: (activeExam.duration * 60) - timeRemaining
                });
            
            if (error) {
                showToast('Error saving attempt', 'error');
            } else {
                showToast(`Exam submitted! Score: ${Math.round(correctCount/currentQuestions.length * 100)}%`, 'success');
            }
            
            document.getElementById('takeExamModal').classList.add('hidden');
            document.getElementById('takeExamModal').style.display = 'none';
            loadExams();
        }
        
        async function loadAttempts() {
            setActiveNav('navAttempts');
            document.getElementById('mainContent').innerHTML = `
                <div>
                    <h1 class="text-2xl font-bold mb-6">📊 My Attempt History</h1>
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b">
                                <tr><th class="p-4 text-left">Exam</th><th class="p-4 text-left">Date</th><th class="p-4 text-left">Score</th><th class="p-4 text-left">Time</th><th class="p-4 text-left">Status</th></tr>
                            </thead>
                            <tbody id="attemptsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            `;
            
            const { data: attempts } = await supabase
                .from('attempts')
                .select('*, exam_sessions(title)')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            const tbody = document.getElementById('attemptsTableBody');
            if (!attempts?.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-8 text-gray-500">No attempts yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = attempts.map(a => {
                const percent = Math.round(a.score / a.total * 100);
                return `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4">${a.exam_sessions?.title || `${a.subject} - ${a.chapter}`}</td>
                        <td class="p-4 text-gray-500">${new Date(a.created_at).toLocaleDateString()}</td>
                        <td class="p-4"><span class="font-bold ${percent >= 70 ? 'text-green-600' : 'text-red-600'}">${percent}%</span> (${a.score}/${a.total})</td>
                        <td class="p-4 text-gray-500">${Math.floor(a.time_taken / 60)}:${(a.time_taken % 60).toString().padStart(2, '0')}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-full text-xs ${percent >= 70 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${percent >= 70 ? 'Passed' : 'Failed'}</span></td>
                    </tr>
                `;
            }).join('');
        }
        
        async function loadProfile() {
            setActiveNav('navProfile');
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            document.getElementById('mainContent').innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <h1 class="text-2xl font-bold mb-6">👤 My Profile</h1>
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                        <div class="p-8 text-center border-b">
                            <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4">
                                ${(profile?.full_name?.[0] || 'U').toUpperCase()}
                            </div>
                            <h2 class="text-xl font-bold">${profile?.full_name || 'Student'}</h2>
                            <p class="text-gray-500">${currentUser.email}</p>
                            <p class="text-sm text-blue-600 mt-2 capitalize">${profile?.role}</p>
                        </div>
                        <div class="p-6 space-y-4">
                            <div class="flex justify-between py-2 border-b"><span class="text-gray-600">Member Since</span><span class="font-medium">${new Date(profile?.created_at).toLocaleDateString()}</span></div>
                            <div class="flex justify-between py-2 border-b"><span class="text-gray-600">Current Streak</span><span class="font-medium">${profile?.streak || 0} days</span></div>
                            <div class="flex justify-between py-2 border-b"><span class="text-gray-600">Badge</span><span class="font-medium">${profile?.badge || 'Beginner'}</span></div>
                            <div class="flex justify-between py-2 border-b"><span class="text-gray-600">Total Attempts</span><span class="font-medium" id="totalAttempts">-</span></div>
                        </div>
                    </div>
                </div>
            `;
            
            const { count } = await supabase
                .from('attempts')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id);
            
            document.getElementById('totalAttempts').textContent = count || 0;
        }
        
        function closeExamModal() {
            document.getElementById('examModal').classList.add('hidden');
            document.getElementById('examModal').classList.remove('flex');
        }
        
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }
        
        // Make functions global
        window.loadDashboard = loadDashboard;
        window.loadExams = loadExams;
        window.loadAttempts = loadAttempts;
        window.loadProfile = loadProfile;
        window.startExam = startExam;
        window.selectAnswer = selectAnswer;
        window.nextQuestion = nextQuestion;
        window.previousQuestion = previousQuestion;
        window.goToQuestion = goToQuestion;
        window.submitExam = submitExam;
        window.closeExamModal = closeExamModal;
        window.logout = logout;
        
        init();
    </script>
</body>
</html>
