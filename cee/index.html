<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEE Medico Nepal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-700 text-white p-4 text-center text-2xl font-bold">
CEE Medico Nepal
</header>

<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-6 text-center">Login / Signup</h2>

<input id="name" class="w-full border p-3 rounded mb-3" placeholder="Full Name">

<input id="email" class="w-full border p-3 rounded mb-3" placeholder="Email">

<input id="password" type="password" class="w-full border p-3 rounded mb-4" placeholder="Password">

<div class="flex gap-3">
<button onclick="signup()" class="flex-1 bg-green-600 text-white p-3 rounded">
Signup
</button>

<button onclick="login()" class="flex-1 bg-blue-600 text-white p-3 rounded">
Login
</button>
</div>

<p id="msg" class="mt-4 text-center"></p>

</div>

<footer class="fixed bottom-0 w-full bg-gray-900 text-white text-center p-3">
© 2026 CEE Medico Nepal
</footer>

<script>
 const SUPABASE_URL = 'https://rpudsnrqlhataqfavcjh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo';
       

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signup() {

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signUp({
email,
password
});

if(error){
document.getElementById("msg").innerText = error.message;
return;
}

await supabase.from("profiles").insert({
id:data.user.id,
full_name:name,
email:email
});

document.getElementById("msg").innerText = "Signup success";
}

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabase.auth.signInWithPassword({
email,
password
});

if(error){
document.getElementById("msg").innerText = error.message;
return;
}

window.location.href = "quiz.html";
}
</script>

</body>
</html>
