<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial; text-align:center; margin-top:100px;">

<h2>Set New Password</h2>

<input id="newPass" type="password" placeholder="New password">
<br><br>
<button onclick="updatePassword()">Update Password</button>

<p id="msg"></p>

<script>
const supabase = window.supabase.createClient(
  "https://rpudsnrqlhataqfavcjh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo"
);

// HANDLE RECOVERY SESSION FROM EMAIL LINK
(async () => {
  const hash = window.location.hash;

  if (!hash.includes("access_token")) {
    document.getElementById("msg").innerText = "Invalid or expired link";
    return;
  }

  const { error } = await supabase.auth.getSessionFromUrl({ storeSession: true });

  if (error) {
    document.getElementById("msg").innerText = error.message;
  }
})();

async function updatePassword() {
  const password = document.getElementById("newPass").value;

  const { error } = await supabase.auth.updateUser({
    password
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  document.getElementById("msg").innerText = "Password updated successfully! Redirecting...";

  setTimeout(() => {
    window.location.href = "https://ceemediconepal.xyz/cee/index.html";
  }, 1500);
}
</script>

</body>
</html>
