<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:80px;
  background:#0f172a;
  color:white;
}

.box{
  width:320px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}

#msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Set New Password</h2>

  <input id="newPass" type="password" placeholder="New password">
  <input id="confirmPass" type="password" placeholder="Confirm password">

  <button onclick="updatePassword()">Update Password</button>

  <p id="msg"></p>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://rpudsnrqlhataqfavcjh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo"
);

// STEP 1: CHECK SESSION FROM EMAIL LINK
(async () => {
  const { data: { session }, error } = await supabase.auth.getSession();

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  if (!session) {
    document.getElementById("msg").innerText = "Invalid or expired reset link";
  }
})();

// STEP 2: UPDATE PASSWORD
async function updatePassword() {

  const pass1 = document.getElementById("newPass").value.trim();
  const pass2 = document.getElementById("confirmPass").value.trim();
  const msg = document.getElementById("msg");

  // VALIDATION
  if (!pass1 || !pass2) {
    msg.innerText = "Please fill both fields";
    return;
  }

  if (pass1 !== pass2) {
    msg.innerText = "Passwords do not match";
    return;
  }

  if (pass1.length < 6) {
    msg.innerText = "Password must be at least 6 characters";
    return;
  }

  // UPDATE PASSWORD
  const { error } = await supabase.auth.updateUser({
    password: pass1
  });

  if (error) {
    msg.innerText = error.message;
    return;
  }

  msg.innerText = "Password updated successfully! Redirecting...";

  setTimeout(() => {
    window.location.href = "https://ceemediconepal.xyz/cee/index.html";
  }, 1500);
}

</script>

</body>
</html>
