<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Upload</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<header class="bg-red-700 text-white p-4 text-center text-2xl font-bold">
CEE Medico Nepal Admin
</header>

<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-5">Bulk Upload Questions</h2>

<input id="subject" class="w-full border p-3 rounded mb-3" placeholder="Subject Name">

<input id="chapter" class="w-full border p-3 rounded mb-3" placeholder="Chapter Name">

<input type="file" id="fileInput" class="mb-4">

<button onclick="uploadQuestions()" class="bg-blue-600 text-white px-6 py-3 rounded">
Upload Questions
</button>

<p id="msg" class="mt-4"></p>

</div>

<script>
 const SUPABASE_URL = 'https://rpudsnrqlhataqfavcjh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function uploadQuestions(){

const subjectName = document.getElementById("subject").value;
const chapterName = document.getElementById("chapter").value;

const file = document.getElementById("fileInput").files[0];

const text = await file.text();

const questions = JSON.parse(text);

let { data:subject } = await supabase
.from("subjects")
.insert({name:subjectName})
.select()
.single();

let { data:chapter } = await supabase
.from("chapters")
.insert({
subject_id:subject.id,
name:chapterName
})
.select()
.single();

const formatted = questions.map(q=>({
subject_id:subject.id,
chapter_id:chapter.id,
question:q.question,
options:q.options,
correct:q.correct,
explanation:q.explanation
}));

await supabase.from("questions").insert(formatted);

document.getElementById("msg").innerText =
"Questions Uploaded Successfully";
}
</script>

</body>
</html>
