<!DOCTYPE html>
<html>
<head>

<title>MCQ Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:#1e293b;
color:white;
overflow:auto;
}

.sidebar h2{
padding:20px;
}

.sidebar button{
width:100%;
padding:15px;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
}

.content{
margin-left:250px;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border:1px solid #ddd;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

button.action{
background:#2563eb;
color:white;
padding:10px 15px;
border:none;
cursor:pointer;
}

</style>

</head>
<body>

<div class="sidebar">

<h2>MCQ ADMIN</h2>

<button onclick="showSection('dashboard')">Dashboard</button>

<button onclick="showSection('subjects')">Subjects</button>

<button onclick="showSection('chapters')">Chapters</button>

<button onclick="showSection('sets')">Quiz Sets</button>

<button onclick="showSection('questions')">Questions</button>

<button onclick="showSection('import')">Import JSON</button>

<button onclick="showSection('users')">Users</button>

<button onclick="showSection('attempts')">Attempts</button>

<button onclick="showSection('leaderboard')">Leaderboard</button>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<div class="card">
<h2>Dashboard</h2>

<div id="stats"></div>

</div>

</div>

<!-- SUBJECTS -->

<div id="subjects" class="section" style="display:none">

<div class="card">

<h2>Add Subject</h2>

<input id="subjectName">

<button class="action" onclick="addSubject()">
Save Subject
</button>

</div>

<div class="card">

<table id="subjectTable"></table>

</div>

</div>

<!-- CHAPTERS -->

<div id="chapters" class="section" style="display:none">

<div class="card">

<select id="chapterSubject"></select>

<input id="chapterName">

<button class="action"
onclick="addChapter()">
Add Chapter
</button>

</div>

<div class="card">

<table id="chapterTable"></table>

</div>

</div>

<!-- QUIZ SETS -->

<div id="sets" class="section" style="display:none">

<div class="card">

<select id="setChapter"></select>

<input id="setTitle">

<input id="setDuration" value="30">

<button class="action"
onclick="addSet()">

Create Set

</button>

</div>

</div>

<!-- QUESTIONS -->

<div id="questions"
class="section"
style="display:none">

<div class="card">

<select id="questionSet"></select>

<input id="question">

<input id="a">

<input id="b">

<input id="c">

<input id="d">

<select id="correct">

<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>

</select>

<textarea id="explanation"></textarea>

<button class="action"
onclick="saveQuestion()">

Save Question

</button>

</div>

<div class="card">

<table id="questionTable"></table>

</div>

</div>

<!-- IMPORT -->

<div id="import"
class="section"
style="display:none">

<div class="card">

<textarea id="jsonData"
rows="20"></textarea>

<button class="action"
onclick="importJSON()">

Import JSON

</button>

<input type="file"
id="jsonFile">

</div>

</div>

<!-- USERS -->

<div id="users"
class="section"
style="display:none">

<div class="card">

<table id="userTable"></table>

</div>

</div>

<!-- ATTEMPTS -->

<div id="attempts"
class="section"
style="display:none">

<div class="card">

<table id="attemptTable"></table>

</div>

</div>

<!-- LEADERBOARD -->

<div id="leaderboard"
class="section"
style="display:none">

<div class="card">

<table id="leaderboardTable"></table>

</div>

</div>

</div>

<script>

const SUPABASE_URL =
'https://rpudsnrqlhataqfavcjh.supabase.co';

const SUPABASE_ANON_KEY =
'YOUR_ANON_KEY';

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

function showSection(id){

document
.querySelectorAll('.section')
.forEach(x=>x.style.display='none');

document
.getElementById(id)
.style.display='block';

}

async function addSubject(){

const name =
document
.getElementById('subjectName')
.value;

await supabase
.from('subjects')
.insert({name});

loadSubjects();

}

async function addChapter(){

const subject_id =
document
.getElementById('chapterSubject')
.value;

const name =
document
.getElementById('chapterName')
.value;

await supabase
.from('chapters')
.insert({
subject_id,
name
});

}

async function addSet(){

await supabase
.from('quiz_sets')
.insert({

chapter_id:
document
.getElementById('setChapter')
.value,

title:
document
.getElementById('setTitle')
.value,

duration:
document
.getElementById('setDuration')
.value

});

}

async function saveQuestion(){

await supabase
.from('questions')
.insert({

set_id:
questionSet.value,

question:
question.value,

option_a:
a.value,

option_b:
b.value,

option_c:
c.value,

option_d:
d.value,

correct_answer:
correct.value,

explanation:
explanation.value

});

}

async function importJSON(){

const data =
JSON.parse(
document
.getElementById('jsonData')
.value
);

for(const q of data){

await supabase
.from('questions')
.insert({

set_id:
questionSet.value,

question:
q.question,

option_a:
q.options[0],

option_b:
q.options[1],

option_c:
q.options[2],

option_d:
q.options[3],

correct_answer:
q.correct_answer,

explanation:
q.explanation

});

}

alert('Imported');

}

async function approveUser(id){

await supabase
.from('profiles')
.update({
approved:true
})
.eq('id',id);

}

async function blockUser(id){

await supabase
.from('profiles')
.update({
blocked:true
})
.eq('id',id);

}

</script>

</body>
</html>
