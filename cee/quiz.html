<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEE Quiz Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-700 text-white p-4 text-center text-2xl font-bold">
CEE Medico Nepal MCQ Platform
</header>

<div class="max-w-3xl mx-auto mt-6 bg-white p-6 rounded-xl shadow">

<div class="flex justify-between mb-4">
<h2 class="text-xl font-bold">MCQ Exam</h2>
<div id="timer" class="text-red-600 font-bold">30:00</div>
</div>

<div id="quizBox"></div>

<button onclick="submitQuiz()" class="mt-6 bg-green-600 text-white px-6 py-3 rounded">
Submit Exam
</button>

</div>

<footer class="mt-10 bg-gray-900 text-white text-center p-3">
© 2026 CEE Medico Nepal
</footer>

<script>
 const SUPABASE_URL = 'https://rpudsnrqlhataqfavcjh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let questions = [];
let answers = {};

loadQuestions();

async function loadQuestions(){

const { data } = await supabase
.from("questions")
.select("*")
.limit(20);

questions = data;

let html = "";

data.forEach((q,index)=>{

html += `
<div class="border p-4 rounded mb-5">

<h3 class="font-bold mb-3">
${index+1}. ${q.question}
</h3>

${q.options.map((opt,i)=>`
<label class="block mb-2">
<input type="radio"
name="q${q.id}"
value="${i}"
onclick="saveAnswer(${q.id},${i})">
${opt}
</label>
`).join("")}

</div>
`;

});

document.getElementById("quizBox").innerHTML = html;
}

function saveAnswer(qid,val){
answers[qid]=val;
}

async function submitQuiz(){

let correct=0;
let wrong=0;

questions.forEach(q=>{

if(answers[q.id]==q.correct){
correct++;
}else{
wrong++;
}
});

let score = correct;
let percentage = (correct/questions.length)*100;

const { data:{user} } = await supabase.auth.getUser();

await supabase.from("attempts").insert({
user_id:user.id,
total_questions:questions.length,
correct_answers:correct,
wrong_answers:wrong,
score:score,
percentage:percentage
});

alert(`Score: ${score}/${questions.length}`);
location.reload();
}

let time=1800;

setInterval(()=>{
time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
`${m}:${s<10?'0':''}${s}`;

if(time<=0){
submitQuiz();
}
},1000);

</script>

</body>
</html>
