<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CEE Medic Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:350px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.primary { background:#2563eb; color:white; }
.google { background:#ef4444; color:white; }
.link { background:transparent; color:#38bdf8; }

.hidden { display:none; }

h2 { text-align:center; }
</style>
</head>

<body>

<div class="box">

<h2>CEE Medic Nepal</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button class="primary" onclick="login()">Login</button>
  <button class="google" onclick="googleLogin()">Login with Google</button>
  <button class="link" onclick="show('signupBox')">Create account</button>
  <button class="link" onclick="show('forgotBox')">Forgot password?</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="hidden">
  <input id="signupEmail" placeholder="Email">
  <input id="signupPass" type="password" placeholder="Password">
  <button class="primary" onclick="signup()">Sign Up</button>
  <button class="link" onclick="show('loginBox')">Back to login</button>
</div>

<!-- FORGOT -->
<div id="forgotBox" class="hidden">
  <input id="forgotEmail" placeholder="Email">
  <button class="primary" onclick="forgot()">Reset Password</button>
  <button class="link" onclick="show('loginBox')">Back to login</button>
</div>

</div>

<script>

const SUPABASE_URL = 'https://rpudsnrqlhataqfavcjh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// redirect after login
const REDIRECT_URL = 'https://ceemediconepal.xyz/cee/index1.html';

// SWITCH UI
function show(id){
  document.querySelectorAll('.box > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// EMAIL LOGIN
async function login(){
  const email = loginEmail.value;
  const password = loginPass.value;

  const { error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  window.location.href = REDIRECT_URL;
}

// SIGNUP
async function signup(){
  const email = signupEmail.value;
  const password = signupPass.value;

  const { error } = await sb.auth.signUp({
    email,
    password,
    options: {
      emailRedirectTo: REDIRECT_URL
    }
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Check your email for verification!");
  show('loginBox');
}

// GOOGLE LOGIN
async function googleLogin(){
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{
      redirectTo: REDIRECT_URL
    }
  });
}

// FORGOT PASSWORD
async function forgot(){
  const email = forgotEmail.value;

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: REDIRECT_URL
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Password reset email sent!");
  show('loginBox');
}

// AUTO SESSION CHECK
(async()=>{
  const { data:{session} } = await sb.auth.getSession();

  if(session){
    window.location.href = REDIRECT_URL;
  }
})();
</script>

</body>
</html>
