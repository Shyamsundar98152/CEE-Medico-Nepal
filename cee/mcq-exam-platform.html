<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCQ Exam Platform</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#111827;border-bottom:1px solid #222}
.container{max-width:900px;margin:0 auto;padding:20px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px;margin-bottom:12px}
.q-title{font-size:16px;margin-bottom:10px}
.option{display:block;padding:10px;margin:6px 0;background:#0f172a;border:1px solid #1f2937;border-radius:8px;cursor:pointer}
.option:hover{border-color:#6366f1}
.option input{margin-right:8px}
.btn{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.btn-primary{background:#6366f1;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.timer{font-weight:bold;color:#22c55e}
.grid{display:flex;justify-content:space-between;align-items:center}
</style>
</head>

<body>

<div class="header">
  <div>🧠 MCQ Exam Platform</div>
  <div>⏱ Time Left: <span class="timer" id="timer">--:--</span></div>
</div>

<div class="container">

  <div id="quiz-info" class="card">Loading quiz...</div>

  <div id="questions"></div>

  <button class="btn btn-primary" onclick="submitExam()" style="width:100%;margin-top:12px">
    Submit Exam
  </button>

</div>

<script>

// ─────────────────────────────
// SUPABASE CONFIG
// ─────────────────────────────
const SUPABASE_URL = "https://rpudsnrqlhataqfavcjh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─────────────────────────────
// STATE
// ─────────────────────────────
let quiz = null;
let answers = {};
let timeLeft = 0;
let timerInterval = null;
let user = null;

// ─────────────────────────────
// AUTH CHECK
// ─────────────────────────────
async function checkAuth(){
  const { data } = await sb.auth.getSession();
  if(!data.session){
    alert("Login required");
    location.href = "login.html";
    return;
  }
  user = data.session.user;
}

// ─────────────────────────────
// LOAD QUIZ
// ─────────────────────────────
async function loadQuiz(){

  const quizId = sessionStorage.getItem("launch_quiz_id");

  if(!quizId){
    document.getElementById("quiz-info").innerHTML = "No quiz selected";
    return;
  }

  const { data, error } = await sb
    .from("quizzes")
    .select("*")
    .eq("id", quizId)
    .single();

  if(error){
    document.getElementById("quiz-info").innerHTML = "Failed to load quiz";
    return;
  }

  quiz = data;

  document.getElementById("quiz-info").innerHTML = `
    <h3>${quiz.subject} - ${quiz.chapter}</h3>
    <p>Set: ${quiz.set}</p>
    <p>Total Questions: ${quiz.questions.length}</p>
  `;

  renderQuestions();
  startTimer(quiz.duration_minutes || 30);
}

// ─────────────────────────────
// RENDER QUESTIONS
// ─────────────────────────────
function renderQuestions(){
  const wrap = document.getElementById("questions");
  wrap.innerHTML = "";

  quiz.questions.forEach((q, index)=>{

    const options = q.options.map((opt, i)=>`
      <label class="option">
        <input type="radio" name="q${index}" value="${i}" 
          onchange="answers[${index}]=${i}">
        ${opt}
      </label>
    `).join("");

    wrap.innerHTML += `
      <div class="card">
        <div class="q-title">
          Q${index+1}. ${q.question}
        </div>
        ${options}
      </div>
    `;
  });
}

// ─────────────────────────────
// TIMER
// ─────────────────────────────
function startTimer(minutes){

  timeLeft = minutes * 60;

  timerInterval = setInterval(()=>{
    timeLeft--;

    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;

    document.getElementById("timer").innerText =
      `${m}:${s.toString().padStart(2,'0')}`;

    if(timeLeft <= 0){
      clearInterval(timerInterval);
      submitExam(true);
    }

  },1000);
}

// ─────────────────────────────
// SUBMIT EXAM
// ─────────────────────────────
async function submitExam(auto=false){

  clearInterval(timerInterval);

  let score = 0;
  const total = quiz.questions.length;

  quiz.questions.forEach((q,i)=>{
    if(answers[i] == q.correct){
      score++;
    }
  });

  const percentage = Math.round((score/total)*100);

  // Save attempt
  await sb.from("attempts").insert({
    user_id: user.id,
    quiz_id: quiz.id,
    subject: quiz.subject,
    chapter: quiz.chapter,
    set: quiz.set,
    score,
    total,
    percentage,
    time_taken: (quiz.duration_minutes*60) - timeLeft
  });

  // Update leaderboard (simple upsert logic)
  const { data: existing } = await sb
    .from("leaderboard")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if(existing){

    await sb.from("leaderboard")
      .update({
        total_attempts: existing.total_attempts + 1,
        total_score: existing.total_score + score,
        average_percentage: Math.round((existing.average_percentage + percentage)/2)
      })
      .eq("user_id", user.id);

  } else {

    await sb.from("leaderboard").insert({
      user_id: user.id,
      total_attempts: 1,
      total_score: score,
      average_percentage: percentage
    });
  }

  alert(
    auto
      ? `Time's up! Submitted automatically\nScore: ${score}/${total}`
      : `Submitted!\nScore: ${score}/${total}`
  );

  location.href = "mcq-exam-platform.html";
}

(async()=>{
  await checkAuth();
  await loadQuiz();
})();

</script>

</body>
</html>
