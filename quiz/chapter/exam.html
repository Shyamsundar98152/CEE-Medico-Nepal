<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEE Exam — CEE Medico Nepal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                colors: {
                    medical: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',950:'#0c4a6e' }
                }
            }}
        }
    </script>
    <style>
        .reveal{opacity:0;transform:translateY(24px);transition:all .8s cubic-bezier(.16,1,.3,1)}.reveal.active{opacity:1;transform:translateY(0)}
        .scrolled-header{background-color:rgba(255,255,255,.85)!important;backdrop-filter:blur(12px);box-shadow:0 4px 30px rgba(0,0,0,.03)}
        .shimmer-btn{position:relative;overflow:hidden}.shimmer-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.2),transparent);transform:rotate(45deg);transition:.5s;opacity:0}.shimmer-btn:hover::after{opacity:1;left:120%;transition:all .8s ease-in-out}
        #timerBar{transition:width 1s linear}
        .option-btn{transition:all .2s ease}
        .option-btn.correct{background:rgba(16,185,129,.15)!important;border-color:#10b981!important;color:#059669;border-width:2px}
        .option-btn.wrong{background:rgba(244,63,94,.15)!important;border-color:#f43f5e!important;color:#be123c;border-width:2px}
    </style>
</head>
<body class="bg-[#f8fafc] text-medical-950 font-sans antialiased overflow-x-hidden flex flex-col min-h-screen">

    <div id="header-root"></div>

    <!-- === STEP 1: SUBJECT & CHAPTER SELECTION === -->
    <main id="selectionScreen" class="flex-1 max-w-3xl mx-auto px-4 sm:px-6 py-12 w-full">
        <div class="text-center mb-10 reveal">
            <span class="text-xs font-bold text-medical-500 uppercase tracking-widest">CEE Exam Engine</span>
            <h1 class="text-3xl sm:text-4xl font-black text-slate-900 mt-2">Choose Your Subject & Chapter</h1>
            <p class="text-slate-500 text-sm mt-2">Questions are loaded live from Firestore. Negative marking applies (4/−1).</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-100 shadow-xl p-8 space-y-6 reveal">
            <!-- Subject Select -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-book-open text-medical-500 mr-2"></i>Select Subject</label>
                <select id="subjectSelect" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-medical-400 bg-slate-50">
                    <option value="">— Loading subjects from Firestore…</option>
                </select>
            </div>
            <!-- Chapter Select -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-list text-medical-500 mr-2"></i>Select Chapter</label>
                <select id="chapterSelect" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-medical-400 bg-slate-50" disabled>
                    <option value="">— Select a subject first</option>
                </select>
            </div>
            <!-- Question Count -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-hashtag text-medical-500 mr-2"></i>Number of Questions</label>
                <div class="flex gap-3">
                    <button class="qcount-btn flex-1 py-2.5 rounded-xl border-2 border-slate-200 text-sm font-bold hover:border-medical-400 hover:text-medical-600 transition-all" data-val="10">10 Qs</button>
                    <button class="qcount-btn flex-1 py-2.5 rounded-xl border-2 border-medical-400 text-medical-600 bg-medical-50 text-sm font-bold" data-val="25">25 Qs</button>
                    <button class="qcount-btn flex-1 py-2.5 rounded-xl border-2 border-slate-200 text-sm font-bold hover:border-medical-400 hover:text-medical-600 transition-all" data-val="50">50 Qs</button>
                    <button class="qcount-btn flex-1 py-2.5 rounded-xl border-2 border-slate-200 text-sm font-bold hover:border-medical-400 hover:text-medical-600 transition-all" data-val="100">100 Qs</button>
                </div>
            </div>
            <!-- Negative Marking Toggle -->
            <label class="flex items-center justify-between cursor-pointer bg-slate-50 rounded-xl p-4">
                <span class="text-sm font-bold text-slate-700"><i class="fa-solid fa-minus-circle text-rose-500 mr-2"></i>Enable Negative Marking (−1 per wrong)</span>
                <div class="relative">
                    <input type="checkbox" id="negMarkToggle" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-slate-300 peer-checked:bg-medical-500 rounded-full transition-colors"></div>
                    <div class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow peer-checked:translate-x-5 transition-transform"></div>
                </div>
            </label>

            <button id="startExamBtn" disabled class="shimmer-btn w-full bg-medical-500 disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-medical-600 text-white font-extrabold py-4 rounded-2xl text-base shadow-xl shadow-medical-500/20 active:scale-95 transition-all">
                <i class="fa-solid fa-play mr-2"></i> Start Exam
            </button>
        </div>
    </main>

    <!-- === STEP 2: EXAM ENGINE === -->
    <main id="examScreen" class="hidden flex-1 max-w-3xl mx-auto px-4 sm:px-6 py-10 w-full">

        <!-- Top Bar -->
        <div class="flex items-center justify-between mb-6">
            <div class="text-sm font-bold text-slate-600">
                <span id="examSubjectLabel" class="text-medical-500"></span> — <span id="examChapterLabel" class="text-slate-500"></span>
            </div>
            <div class="flex items-center gap-4">
                <!-- Score Live -->
                <span class="text-sm font-extrabold text-emerald-600" id="liveScore">Score: 0</span>
                <!-- Timer -->
                <div class="flex items-center gap-1.5 bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-bold" id="timerDisplay">
                    <i class="fa-regular fa-clock text-medical-500"></i>
                    <span id="timerText">00:00</span>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-100 rounded-full h-2 mb-6">
            <div id="progressBar" class="bg-gradient-to-r from-medical-500 to-indigo-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>

        <!-- Question Card -->
        <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-2xl p-6 sm:p-8 text-white shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Question <span id="qNum">1</span> of <span id="qTotal">0</span></span>
                <span id="diffBadge" class="text-[10px] font-bold px-2.5 py-1 rounded-full bg-white/10 text-slate-300 uppercase tracking-wider">easy</span>
            </div>
            <p id="questionText" class="text-base sm:text-lg font-semibold leading-relaxed mb-6 min-h-[3rem]">Loading question…</p>

            <div id="optionsBox" class="space-y-3"></div>

            <!-- Feedback & Explanation -->
            <div id="feedbackBox" class="hidden mt-4 p-4 rounded-xl text-sm font-bold"></div>
            <div id="explanationBox" class="hidden mt-3 p-4 bg-white/5 rounded-xl text-sm text-slate-300 leading-relaxed"></div>

            <div class="flex gap-3 mt-5">
                <button id="showExplBtn" class="hidden flex-1 py-2.5 rounded-xl border border-white/20 text-white/70 text-sm font-bold hover:bg-white/10 transition-all">
                    <i class="fa-regular fa-lightbulb mr-1"></i> Show Explanation
                </button>
                <button id="nextBtn" class="hidden flex-1 shimmer-btn py-2.5 bg-medical-500 hover:bg-medical-600 text-white rounded-xl text-sm font-bold transition-all">
                    Next Question <i class="fa-solid fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>

        <!-- Question Navigator -->
        <div id="questionNav" class="mt-6 flex flex-wrap gap-2"></div>
    </main>

    <!-- === STEP 3: RESULT REDIRECT HANDLED IN result.html === -->

    <div id="footer-root"></div>

    <script type="module">
        import { renderHeader, renderFooter, initSharedScripts } from './js/shared.js';
        import { db } from './js/firebase-config.js';
        import {
            collection, getDocs, query, orderBy, limit
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        document.getElementById('header-root').innerHTML = renderHeader('Take Exam');
        document.getElementById('footer-root').innerHTML = renderFooter();
        initSharedScripts();

        // ─── State ─────────────────────────────────────────────────────
        let allQuestions = [], currentIdx = 0, score = 0, answers = [];
        let timerInterval = null, elapsedSec = 0;
        let selectedCount = 25, negMarking = true;

        // ─── Elements ──────────────────────────────────────────────────
        const selScreen   = document.getElementById('selectionScreen');
        const examScreen  = document.getElementById('examScreen');
        const subjectSel  = document.getElementById('subjectSelect');
        const chapterSel  = document.getElementById('chapterSelect');
        const startBtn    = document.getElementById('startExamBtn');
        const qNumEl      = document.getElementById('qNum');
        const qTotalEl    = document.getElementById('qTotal');
        const qTextEl     = document.getElementById('questionText');
        const optionsBox  = document.getElementById('optionsBox');
        const feedbackBox = document.getElementById('feedbackBox');
        const explBox     = document.getElementById('explanationBox');
        const showExplBtn = document.getElementById('showExplBtn');
        const nextBtn     = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const liveScoreEl = document.getElementById('liveScore');
        const timerText   = document.getElementById('timerText');
        const diffBadge   = document.getElementById('diffBadge');

        // ─── Pre-fill subject from URL param ──────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const preSubject = urlParams.get('subject');

        // ─── Load Subjects ────────────────────────────────────────────
        async function loadSubjects() {
            try {
                const snap = await getDocs(collection(db, 'subjects'));
                subjectSel.innerHTML = '<option value="">— Select Subject</option>';
                snap.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.id.charAt(0).toUpperCase() + d.id.slice(1);
                    subjectSel.appendChild(opt);
                });
                if (preSubject) {
                    subjectSel.value = preSubject;
                    subjectSel.dispatchEvent(new Event('change'));
                }
            } catch (e) {
                subjectSel.innerHTML = '<option value="">⚠ Firestore connection error</option>';
            }
        }

        subjectSel.addEventListener('change', async () => {
            const sub = subjectSel.value;
            chapterSel.disabled = true;
            startBtn.disabled = true;
            if (!sub) { chapterSel.innerHTML = '<option value="">— Select a subject first</option>'; return; }
            chapterSel.innerHTML = '<option value="">Loading chapters…</option>';
            try {
                const snap = await getDocs(collection(db, 'subjects', sub, 'chapters'));
                chapterSel.innerHTML = '<option value="">— Select Chapter</option>';
                snap.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.id.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    chapterSel.appendChild(opt);
                });
                chapterSel.disabled = false;
            } catch {
                chapterSel.innerHTML = '<option value="">⚠ Could not load chapters</option>';
            }
        });

        chapterSel.addEventListener('change', () => {
            startBtn.disabled = !(chapterSel.value);
        });

        // ─── Question Count Buttons ───────────────────────────────────
        document.querySelectorAll('.qcount-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.qcount-btn').forEach(b => {
                    b.className = 'qcount-btn flex-1 py-2.5 rounded-xl border-2 border-slate-200 text-sm font-bold hover:border-medical-400 hover:text-medical-600 transition-all';
                });
                btn.className = 'qcount-btn flex-1 py-2.5 rounded-xl border-2 border-medical-400 text-medical-600 bg-medical-50 text-sm font-bold';
                selectedCount = parseInt(btn.dataset.val);
            });
        });

        document.getElementById('negMarkToggle').addEventListener('change', e => {
            negMarking = e.target.checked;
        });

        // ─── Start Exam ───────────────────────────────────────────────
        startBtn.addEventListener('click', async () => {
            const sub = subjectSel.value;
            const chap = chapterSel.value;
            document.getElementById('examSubjectLabel').textContent = sub.charAt(0).toUpperCase() + sub.slice(1);
            document.getElementById('examChapterLabel').textContent = chap.replace(/-/g, ' ');

            startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading Questions…';
            startBtn.disabled = true;

            try {
                const q = query(collection(db, 'subjects', sub, 'chapters', chap, 'questions'), orderBy('createdAt'), limit(selectedCount));
                const snap = await getDocs(q);
                allQuestions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                // Shuffle
                allQuestions = allQuestions.sort(() => Math.random() - 0.5).slice(0, selectedCount);
            } catch (e) {
                alert('⚠ Could not load questions. Check Firestore connection.');
                startBtn.innerHTML = '<i class="fa-solid fa-play mr-2"></i> Start Exam';
                startBtn.disabled = false;
                return;
            }

            if (allQuestions.length === 0) {
                alert('No questions found in this chapter. Please add questions via Admin panel.');
                startBtn.innerHTML = '<i class="fa-solid fa-play mr-2"></i> Start Exam';
                startBtn.disabled = false;
                return;
            }

            // Init exam
            answers = new Array(allQuestions.length).fill(null);
            score = 0; elapsedSec = 0; currentIdx = 0;
            selScreen.classList.add('hidden');
            examScreen.classList.remove('hidden');
            qTotalEl.textContent = allQuestions.length;
            buildNav();
            startTimer();
            loadQuestion();
        });

        // ─── Timer ─────────────────────────────────────────────────────
        function startTimer() {
            timerInterval = setInterval(() => {
                elapsedSec++;
                const m = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
                const s = String(elapsedSec % 60).padStart(2, '0');
                timerText.textContent = `${m}:${s}`;
            }, 1000);
        }

        // ─── Load Question ─────────────────────────────────────────────
        function loadQuestion() {
            const q = allQuestions[currentIdx];
            qNumEl.textContent = currentIdx + 1;
            progressBar.style.width = `${((currentIdx + 1) / allQuestions.length) * 100}%`;
            qTextEl.textContent = q.question;
            diffBadge.textContent = q.difficulty || 'medium';
            diffBadge.className = `text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider ${
                q.difficulty === 'easy' ? 'bg-emerald-500/20 text-emerald-300' :
                q.difficulty === 'hard' ? 'bg-rose-500/20 text-rose-300' : 'bg-amber-500/20 text-amber-300'
            }`;
            feedbackBox.classList.add('hidden');
            explBox.classList.add('hidden');
            showExplBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
            nextBtn.innerHTML = currentIdx < allQuestions.length - 1
                ? 'Next Question <i class="fa-solid fa-arrow-right ml-1"></i>'
                : 'Finish Exam <i class="fa-solid fa-flag-checkered ml-1"></i>';

            optionsBox.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left bg-white/5 border border-white/10 p-3.5 rounded-xl text-sm font-semibold hover:bg-white/10 active:scale-[.99] transition-all flex items-center justify-between group';
                btn.innerHTML = `<span>${opt}</span><span class="w-6 h-6 rounded-full border border-white/20 flex items-center justify-center text-xs group-hover:bg-indigo-500/20 group-hover:border-indigo-500 transition-colors">${String.fromCharCode(65+i)}</span>`;
                btn.onclick = () => selectOption(i, btn);
                // Re-highlight if already answered
                if (answers[currentIdx] !== null) {
                    btn.disabled = true;
                    const correct = parseInt(q.answer) || q.options.indexOf(q.answer) || q.correct || 0;
                    if (i === correct) btn.classList.add('correct');
                    else if (i === answers[currentIdx]) btn.classList.add('wrong');
                    btn.style.opacity = '0.6';
                    showExplBtn.classList.remove('hidden');
                    nextBtn.classList.remove('hidden');
                }
            });
        }

        function selectOption(idx, btn) {
            if (answers[currentIdx] !== null) return;
            answers[currentIdx] = idx;
            const q = allQuestions[currentIdx];
            const correct = Number.isInteger(q.correct) ? q.correct : q.options.indexOf(q.answer);

            Array.from(optionsBox.children).forEach((b, i) => {
                b.disabled = true;
                if (i === correct) b.classList.add('correct');
                else if (i === idx) b.classList.add('wrong');
            });

            const isCorrect = idx === correct;
            if (isCorrect) {
                score += 4;
                feedbackBox.className = 'p-4 rounded-xl text-sm font-bold bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/20';
                feedbackBox.innerHTML = '<i class="fa-solid fa-check mr-1.5"></i> Correct! +4 marks';
            } else {
                score += negMarking ? -1 : 0;
                feedbackBox.className = 'p-4 rounded-xl text-sm font-bold bg-rose-500/10 text-rose-400 ring-1 ring-rose-500/20';
                feedbackBox.innerHTML = `<i class="fa-solid fa-circle-exclamation mr-1.5"></i> Wrong! ${negMarking ? '−1 mark' : '0 marks'}.`;
            }
            feedbackBox.classList.remove('hidden');
            liveScoreEl.textContent = `Score: ${score}`;
            if (q.explanation) {
                explBox.textContent = q.explanation;
                showExplBtn.classList.remove('hidden');
            }
            nextBtn.classList.remove('hidden');
            updateNav();
        }

        showExplBtn.addEventListener('click', () => explBox.classList.toggle('hidden'));
        nextBtn.addEventListener('click', () => {
            if (currentIdx < allQuestions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                finishExam();
            }
        });

        function finishExam() {
            clearInterval(timerInterval);
            const correct = answers.filter((a, i) => {
                if (a === null) return false;
                const q = allQuestions[i];
                const c = Number.isInteger(q.correct) ? q.correct : q.options.indexOf(q.answer);
                return a === c;
            }).length;
            const wrong = answers.filter((a, i) => {
                if (a === null) return false;
                const q = allQuestions[i];
                const c = Number.isInteger(q.correct) ? q.correct : q.options.indexOf(q.answer);
                return a !== c;
            }).length;
            const skipped = answers.filter(a => a === null).length;

            const resultData = {
                score, correct, wrong, skipped,
                total: allQuestions.length,
                timeSec: elapsedSec,
                subject: subjectSel.value,
                chapter: chapterSel.value,
                date: new Date().toISOString()
            };
            localStorage.setItem('cee_last_result', JSON.stringify(resultData));
            window.location.href = 'result.html';
        }

        // ─── Question Nav ─────────────────────────────────────────────
        function buildNav() {
            const nav = document.getElementById('questionNav');
            nav.innerHTML = allQuestions.map((_, i) => `
                <button class="qnav w-9 h-9 rounded-lg text-xs font-bold border-2 border-slate-200 bg-white text-slate-600 hover:border-medical-400 transition-all" data-i="${i}">${i+1}</button>
            `).join('');
            nav.querySelectorAll('.qnav').forEach(b => {
                b.addEventListener('click', () => { currentIdx = parseInt(b.dataset.i); loadQuestion(); });
            });
        }

        function updateNav() {
            const btns = document.querySelectorAll('.qnav');
            btns.forEach((btn, i) => {
                if (answers[i] !== null) {
                    const q = allQuestions[i];
                    const correct = Number.isInteger(q.correct) ? q.correct : q.options.indexOf(q.answer);
                    btn.className = `qnav w-9 h-9 rounded-lg text-xs font-bold border-2 transition-all ${answers[i] === correct ? 'border-emerald-400 bg-emerald-50 text-emerald-700' : 'border-rose-400 bg-rose-50 text-rose-700'}`;
                }
                if (i === currentIdx) btn.classList.add('ring-2', 'ring-medical-400');
            });
        }

        loadSubjects();
    </script>
</body>
</html>
