<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result — CEE Medico Nepal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                colors: { medical: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',950:'#0c4a6e' }}
            }}
        }
    </script>
    <style>
        .scrolled-header{background-color:rgba(255,255,255,.85)!important;backdrop-filter:blur(12px)}
        .shimmer-btn{position:relative;overflow:hidden}.shimmer-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.2),transparent);transform:rotate(45deg);transition:.5s;opacity:0}.shimmer-btn:hover::after{opacity:1;left:120%;transition:all .8s ease-in-out}
        @keyframes scoreCount { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
        .score-pop { animation: scoreCount .6s cubic-bezier(.16,1,.3,1) both; }
    </style>
</head>
<body class="bg-[#f8fafc] text-medical-950 font-sans antialiased flex flex-col min-h-screen">

    <div id="header-root"></div>

    <main class="flex-1 max-w-2xl mx-auto px-4 sm:px-6 py-12 w-full">

        <div class="text-center mb-8">
            <div id="resultIcon" class="w-20 h-20 rounded-full mx-auto flex items-center justify-center text-4xl mb-4 score-pop"></div>
            <h1 class="text-3xl font-black text-slate-900" id="resultTitle">Calculating…</h1>
            <p class="text-slate-500 text-sm mt-1" id="resultSub"></p>
        </div>

        <!-- Score Card -->
        <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-2xl p-8 text-white mb-6 shadow-2xl score-pop">
            <div class="flex items-center justify-between mb-6">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Your Score</span>
                <span id="subjectChapLabel" class="text-xs font-bold text-medical-400"></span>
            </div>
            <div class="text-center mb-8">
                <div class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-medical-400 to-indigo-400" id="finalScore">0</div>
                <div class="text-slate-400 text-sm mt-1">out of <span id="maxScore">0</span> possible marks</div>
            </div>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-emerald-500/10 rounded-xl p-4">
                    <div class="text-2xl font-black text-emerald-400" id="correctCount">0</div>
                    <div class="text-xs text-emerald-400/70 font-semibold mt-1">Correct</div>
                </div>
                <div class="bg-rose-500/10 rounded-xl p-4">
                    <div class="text-2xl font-black text-rose-400" id="wrongCount">0</div>
                    <div class="text-xs text-rose-400/70 font-semibold mt-1">Wrong</div>
                </div>
                <div class="bg-slate-500/10 rounded-xl p-4">
                    <div class="text-2xl font-black text-slate-400" id="skippedCount">0</div>
                    <div class="text-xs text-slate-400/70 font-semibold mt-1">Skipped</div>
                </div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white rounded-2xl border border-slate-100 shadow-md p-5">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-9 h-9 bg-medical-100 rounded-xl flex items-center justify-center text-medical-600"><i class="fa-solid fa-bullseye"></i></div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Accuracy</span>
                </div>
                <div class="text-3xl font-black text-slate-900" id="accuracyVal">0%</div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-100 shadow-md p-5">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-9 h-9 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600"><i class="fa-regular fa-clock"></i></div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Time Taken</span>
                </div>
                <div class="text-3xl font-black text-slate-900" id="timeVal">0m 0s</div>
            </div>
        </div>

        <!-- Accuracy Progress Bar -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-md p-5 mb-8">
            <div class="flex justify-between mb-3 text-sm font-bold text-slate-600">
                <span>Performance Breakdown</span>
                <span id="performanceLabel" class="text-medical-500"></span>
            </div>
            <div class="flex h-4 rounded-full overflow-hidden gap-0.5">
                <div id="barCorrect" class="bg-emerald-500 rounded-l-full transition-all duration-1000" style="width:0%"></div>
                <div id="barWrong" class="bg-rose-500 transition-all duration-1000" style="width:0%"></div>
                <div id="barSkipped" class="bg-slate-200 rounded-r-full transition-all duration-1000" style="width:0%"></div>
            </div>
            <div class="flex gap-4 mt-2 text-xs font-semibold text-slate-500">
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span>Correct</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-rose-500 inline-block"></span>Wrong</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-slate-300 inline-block"></span>Skipped</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <a href="exam.html" class="shimmer-btn bg-medical-500 hover:bg-medical-600 text-white font-extrabold py-3.5 rounded-2xl text-center shadow-xl transition-all active:scale-95">
                <i class="fa-solid fa-rotate-right mr-2"></i> Retry Exam
            </a>
            <a href="analytics.html" class="bg-white border-2 border-slate-200 hover:border-medical-400 text-slate-700 font-extrabold py-3.5 rounded-2xl text-center shadow-md transition-all active:scale-95">
                <i class="fa-solid fa-chart-line mr-2 text-emerald-500"></i> My Analytics
            </a>
            <a href="leaderboard.html" class="bg-gradient-to-r from-amber-500 to-orange-500 text-white font-extrabold py-3.5 rounded-2xl text-center shadow-md transition-all active:scale-95">
                <i class="fa-solid fa-trophy mr-2"></i> Leaderboard
            </a>
        </div>

    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { renderHeader, renderFooter, initSharedScripts } from './js/shared.js';
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, getDoc, updateDoc, arrayUnion, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        document.getElementById('header-root').innerHTML = renderHeader();
        document.getElementById('footer-root').innerHTML = renderFooter();
        initSharedScripts();

        const data = JSON.parse(localStorage.getItem('cee_last_result') || '{}');
        if (!data.total) {
            document.querySelector('main').innerHTML = `<div class="text-center py-24"><i class="fa-solid fa-circle-exclamation text-4xl text-amber-400 mb-4"></i><p class="font-bold text-slate-600">No exam result found. <a href="exam.html" class="text-medical-500 underline">Take an exam first.</a></p></div>`;
        } else {
            const { score, correct, wrong, skipped, total, timeSec, subject, chapter } = data;
            const maxScore = total * 4;
            const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxScore').textContent = maxScore;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('skippedCount').textContent = skipped;
            document.getElementById('subjectChapLabel').textContent = `${subject} → ${chapter}`;
            document.getElementById('accuracyVal').textContent = `${accuracy}%`;
            const m = Math.floor(timeSec / 60), s = timeSec % 60;
            document.getElementById('timeVal').textContent = `${m}m ${s}s`;

            // Performance label
            const perfEl = document.getElementById('performanceLabel');
            if (accuracy >= 80) { perfEl.textContent = '🏆 Excellent!'; perfEl.className = 'text-emerald-500 font-bold text-sm'; }
            else if (accuracy >= 60) { perfEl.textContent = '👍 Good'; perfEl.className = 'text-medical-500 font-bold text-sm'; }
            else { perfEl.textContent = '📚 Keep Practicing'; perfEl.className = 'text-amber-500 font-bold text-sm'; }

            // Result icon
            const iconEl = document.getElementById('resultIcon');
            const titleEl = document.getElementById('resultTitle');
            const subEl = document.getElementById('resultSub');
            if (accuracy >= 80) {
                iconEl.className = 'w-20 h-20 rounded-full mx-auto flex items-center justify-center text-4xl mb-4 score-pop bg-emerald-100 text-emerald-500';
                iconEl.innerHTML = '<i class="fa-solid fa-trophy"></i>';
                titleEl.textContent = 'Outstanding Performance!';
                subEl.textContent = `You scored ${accuracy}% accuracy. You're CEE-ready!`;
            } else if (accuracy >= 50) {
                iconEl.className = 'w-20 h-20 rounded-full mx-auto flex items-center justify-center text-4xl mb-4 score-pop bg-medical-100 text-medical-500';
                iconEl.innerHTML = '<i class="fa-solid fa-star-half-stroke"></i>';
                titleEl.textContent = 'Good Effort!';
                subEl.textContent = `${accuracy}% accuracy. Keep practicing to improve.`;
            } else {
                iconEl.className = 'w-20 h-20 rounded-full mx-auto flex items-center justify-center text-4xl mb-4 score-pop bg-amber-100 text-amber-500';
                iconEl.innerHTML = '<i class="fa-solid fa-book-open"></i>';
                titleEl.textContent = 'More Practice Needed';
                subEl.textContent = `${accuracy}% accuracy. Review weak chapters and retry.`;
            }

            // Animate bars
            setTimeout(() => {
                document.getElementById('barCorrect').style.width = `${(correct/total)*100}%`;
                document.getElementById('barWrong').style.width = `${(wrong/total)*100}%`;
                document.getElementById('barSkipped').style.width = `${(skipped/total)*100}%`;
            }, 200);

            // Save to Firestore analytics (anonymous)
            const userId = localStorage.getItem('cee_uid') || ('user_' + Math.random().toString(36).substr(2,9));
            localStorage.setItem('cee_uid', userId);
            const today = new Date().toISOString().split('T')[0];

            try {
                // Save leaderboard entry
                await setDoc(doc(db, 'leaderboard', 'daily', today, 'users', userId), {
                    name: localStorage.getItem('cee_name') || 'Anonymous',
                    score, accuracy, timeTaken: timeSec,
                    subject, chapter, updatedAt: Date.now()
                }, { merge: true });

                // Update analytics
                const aRef = doc(db, 'analytics', userId);
                const aSnap = await getDoc(aRef);
                if (!aSnap.exists()) {
                    await setDoc(aRef, { totalScore: score, totalAttempts: 1, accuracyHistory: [accuracy], weakTopics: wrong > correct ? [chapter] : [] });
                } else {
                    await updateDoc(aRef, {
                        totalScore: increment(score),
                        totalAttempts: increment(1),
                        accuracyHistory: arrayUnion(accuracy),
                    });
                }
            } catch (e) {
                // Silently fail — result still shows
            }
        }
    </script>
</body>
</html>
