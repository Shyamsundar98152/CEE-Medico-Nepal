<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CEE Medico Nepal</title>
    <link rel="canonical" href="https://ceemediconepal.xyz/login.html" />
    <meta name="robots" content="noindex">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] },
                colors: { medical: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',950:'#0c4a6e' } }
            }}
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(14,165,233,0.15); }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .float { animation: float 4s ease-in-out infinite; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .fadeUp { animation: fadeUp 0.6s ease forwards; }
        .tab-active { background: #0ea5e9; color: white; }
        .tab-inactive { background: transparent; color: #64748b; }
        input:focus { outline: none; box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-medical-50 via-white to-blue-50 flex flex-col">

    <!-- Header -->
    <header class="w-full bg-white/80 backdrop-blur-md border-b border-medical-100 py-4 px-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 bg-medical-500 rounded-xl flex items-center justify-center text-white font-black text-sm">CM</div>
                <span class="font-extrabold text-medical-950 text-lg">CEE Medico <span class="text-medical-500">Nepal</span></span>
            </a>
            <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-medical-500 transition-colors flex items-center gap-1">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Home
            </a>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex items-center justify-center px-4 py-16">
        <div class="w-full max-w-md">

            <!-- Floating Icon -->
            <div class="flex justify-center mb-6">
                <div class="float w-16 h-16 bg-gradient-to-br from-medical-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-xl shadow-medical-500/30">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
            </div>

            <div class="glass rounded-3xl shadow-2xl shadow-medical-500/10 p-8 fadeUp">
                <h1 class="text-2xl font-black text-slate-900 text-center mb-1">Welcome Back</h1>
                <p class="text-sm text-slate-400 text-center mb-6">Continue your CEE preparation journey</p>

                <!-- Tabs -->
                <div class="flex bg-slate-100 rounded-xl p-1 mb-6 gap-1">
                    <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all tab-active">
                        <i class="fa-solid fa-right-to-bracket mr-1.5"></i>Login
                    </button>
                    <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all tab-inactive">
                        <i class="fa-solid fa-user-plus mr-1.5"></i>Register
                    </button>
                </div>

                <!-- Alert -->
                <div id="alertBox" class="hidden mb-4 p-3 rounded-xl text-sm font-semibold"></div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Email</label>
                            <div class="relative">
                                <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input id="loginEmail" type="email" placeholder="your@email.com"
                                    class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-medium bg-white transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Password</label>
                            <div class="relative">
                                <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input id="loginPassword" type="password" placeholder="••••••••"
                                    class="w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl text-sm font-medium bg-white transition-all">
                                <button onclick="togglePwd('loginPassword', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-medical-500 transition-colors">
                                    <i class="fa-solid fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <div class="text-right">
                            <button onclick="resetPassword()" class="text-xs font-semibold text-medical-500 hover:text-medical-700 transition-colors">Forgot password?</button>
                        </div>
                        <button onclick="loginUser()" id="loginBtn"
                            class="w-full bg-medical-500 hover:bg-medical-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-medical-500/20 active:scale-[0.99] flex items-center justify-center gap-2">
                            <i class="fa-solid fa-right-to-bracket"></i> Sign In
                        </button>
                        <div class="relative flex items-center gap-3">
                            <div class="flex-1 h-px bg-slate-200"></div>
                            <span class="text-xs text-slate-400 font-semibold">OR</span>
                            <div class="flex-1 h-px bg-slate-200"></div>
                        </div>
                        <button onclick="loginWithGoogle()"
                            class="w-full border-2 border-slate-200 hover:border-medical-300 bg-white text-slate-700 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 hover:bg-medical-50">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                            Continue with Google
                        </button>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="hidden">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Full Name</label>
                            <div class="relative">
                                <i class="fa-solid fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input id="regName" type="text" placeholder="Your full name"
                                    class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-medium bg-white transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Email</label>
                            <div class="relative">
                                <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input id="regEmail" type="email" placeholder="your@email.com"
                                    class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-medium bg-white transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Password</label>
                            <div class="relative">
                                <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input id="regPassword" type="password" placeholder="Min 6 characters"
                                    class="w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl text-sm font-medium bg-white transition-all">
                                <button onclick="togglePwd('regPassword', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-medical-500 transition-colors">
                                    <i class="fa-solid fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Target Exam</label>
                            <select id="regExam" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm font-medium bg-white transition-all appearance-none cursor-pointer">
                                <option value="CEE">CEE Nepal</option>
                                <option value="NEET">NEET</option>
                                <option value="IOE">IOE</option>
                                <option value="USMLE">USMLE</option>
                            </select>
                        </div>
                        <button onclick="registerUser()" id="registerBtn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.99] flex items-center justify-center gap-2">
                            <i class="fa-solid fa-user-plus"></i> Create Account
                        </button>
                        <div class="relative flex items-center gap-3">
                            <div class="flex-1 h-px bg-slate-200"></div>
                            <span class="text-xs text-slate-400 font-semibold">OR</span>
                            <div class="flex-1 h-px bg-slate-200"></div>
                        </div>
                        <button onclick="loginWithGoogle()"
                            class="w-full border-2 border-slate-200 hover:border-medical-300 bg-white text-slate-700 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 hover:bg-medical-50">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                            Sign up with Google
                        </button>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-slate-400 mt-6">By continuing, you agree to our <a href="privacy.html" class="text-medical-500 font-semibold hover:underline">Privacy Policy</a></p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-xs">
        <p>© 2026 CEE Medico Nepal. All Rights Reserved.</p>
    </footer>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
            authDomain: "chapter-wise-backup.firebaseapp.com",
            projectId: "chapter-wise-backup",
            storageBucket: "chapter-wise-backup.firebasestorage.app",
            messagingSenderId: "864698641587",
            appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) { window.location.href = 'quiz.html'; }
        });

        function showAlert(msg, type='error') {
            const box = document.getElementById('alertBox');
            box.className = `mb-4 p-3 rounded-xl text-sm font-semibold ${type==='success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-rose-50 text-rose-700 border border-rose-200'}`;
            box.textContent = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 5000);
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Please wait...';
            } else {
                btn.disabled = false;
            }
        }

        async function saveUserToFirestore(user, extra = {}) {
            const ref = doc(db, 'users', user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, {
                    uid: user.uid,
                    name: user.displayName || extra.name || 'Student',
                    email: user.email,
                    targetExam: extra.targetExam || 'CEE',
                    role: 'student',
                    joinedAt: serverTimestamp(),
                    totalTests: 0,
                    totalScore: 0
                });
            }
        }

        window.loginUser = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return showAlert('Please fill in all fields');
            setLoading('loginBtn', true);
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                await saveUserToFirestore(cred.user);
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'quiz.html', 1000);
            } catch(e) {
                showAlert(e.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '').trim());
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
            }
        };

        window.registerUser = async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const targetExam = document.getElementById('regExam').value;
            if (!name || !email || !password) return showAlert('Please fill in all fields');
            if (password.length < 6) return showAlert('Password must be at least 6 characters');
            setLoading('registerBtn', true);
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                await saveUserToFirestore(cred.user, { name, targetExam });
                showAlert('Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'quiz.html', 1000);
            } catch(e) {
                showAlert(e.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '').trim());
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('registerBtn').innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
            }
        };

        window.loginWithGoogle = async () => {
            try {
                const cred = await signInWithPopup(auth, provider);
                await saveUserToFirestore(cred.user);
                showAlert('Google login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'quiz.html', 1000);
            } catch(e) {
                showAlert(e.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '').trim());
            }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) return showAlert('Enter your email first');
            try {
                await sendPasswordResetEmail(auth, email);
                showAlert('Reset link sent! Check your email.', 'success');
            } catch(e) {
                showAlert(e.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '').trim());
            }
        };

        window.togglePwd = (id, btn) => {
            const inp = document.getElementById(id);
            const isText = inp.type === 'text';
            inp.type = isText ? 'password' : 'text';
            btn.innerHTML = `<i class="fa-solid fa-eye${isText ? '' : '-slash'} text-sm"></i>`;
        };

        window.switchTab = (tab) => {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.className = 'flex-1 py-2 rounded-lg text-sm font-bold transition-all tab-active';
                tabRegister.className = 'flex-1 py-2 rounded-lg text-sm font-bold transition-all tab-inactive';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabLogin.className = 'flex-1 py-2 rounded-lg text-sm font-bold transition-all tab-inactive';
                tabRegister.className = 'flex-1 py-2 rounded-lg text-sm font-bold transition-all tab-active';
            }
            document.getElementById('alertBox').classList.add('hidden');
        };
    </script>
</body>
</html>
