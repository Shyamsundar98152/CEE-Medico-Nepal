<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Mock Test — CEE Medico Nepal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                colors: { medical: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',950:'#0c4a6e' }}
            }}
        }
    </script>
    <style>
        .scrolled-header{background-color:rgba(255,255,255,.85)!important;backdrop-filter:blur(12px)}
        .shimmer-btn{position:relative;overflow:hidden}.shimmer-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.2),transparent);transform:rotate(45deg);transition:.5s;opacity:0}.shimmer-btn:hover::after{opacity:1;left:120%;transition:all .8s ease-in-out}
        .option-btn.correct{background:rgba(16,185,129,.15)!important;border-color:#10b981!important;color:#059669;border-width:2px}
        .option-btn.wrong{background:rgba(244,63,94,.15)!important;border-color:#f43f5e!important;color:#be123c;border-width:2px}
        @keyframes countdown { from{stroke-dashoffset:0} to{stroke-dashoffset:283} }
    </style>
</head>
<body class="bg-[#f8fafc] text-medical-950 font-sans antialiased flex flex-col min-h-screen">

    <div id="header-root"></div>

    <!-- Loading Screen -->
    <main id="loadingScreen" class="flex-1 flex flex-col items-center justify-center py-24">
        <div class="w-12 h-12 rounded-full border-4 border-medical-200 border-t-medical-500 animate-spin mb-4"></div>
        <p class="text-slate-500 font-semibold">Loading today's test from Firestore…</p>
    </main>

    <!-- No Test Screen -->
    <main id="noTestScreen" class="hidden flex-1 max-w-xl mx-auto px-4 sm:px-6 py-20 text-center w-full">
        <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center text-amber-500 text-4xl mx-auto mb-5">
            <i class="fa-solid fa-calendar-xmark"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-900 mb-3">No Test Scheduled Today</h1>
        <p class="text-slate-500 mb-6">No daily mock test has been set for <span id="todayLabel" class="font-bold text-slate-700"></span>. Check back tomorrow or ask your admin to schedule one.</p>
        <a href="exam.html" class="shimmer-btn inline-flex items-center gap-2 bg-medical-500 hover:bg-medical-600 text-white font-extrabold px-8 py-4 rounded-2xl shadow-xl transition-all">
            <i class="fa-solid fa-pen-to-square"></i> Practice Chapter Exam Instead
        </a>
    </main>

    <!-- Test Lobby Screen -->
    <main id="lobbyScreen" class="hidden flex-1 max-w-2xl mx-auto px-4 sm:px-6 py-10 w-full">
        <div class="bg-gradient-to-br from-indigo-950 to-[#0c4a6e] rounded-2xl text-white p-8 shadow-2xl mb-6">
            <div class="flex items-start justify-between mb-4">
                <div>
                    <span class="text-xs font-bold text-sky-300 uppercase tracking-widest"><i class="fa-solid fa-calendar-day mr-1"></i> Daily Mock Test</span>
                    <h1 class="text-2xl sm:text-3xl font-black mt-1" id="testTitle">Loading…</h1>
                    <p class="text-sky-100/80 text-sm mt-1" id="testDate"></p>
                </div>
                <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center text-3xl">
                    <i class="fa-solid fa-file-waveform"></i>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 mt-6">
                <div class="bg-white/10 rounded-xl p-3 text-center">
                    <div class="text-2xl font-black" id="lobbyQCount">—</div>
                    <div class="text-xs text-sky-200/70 font-semibold mt-0.5">Questions</div>
                </div>
                <div class="bg-white/10 rounded-xl p-3 text-center">
                    <div class="text-2xl font-black" id="lobbyDuration">—</div>
                    <div class="text-xs text-sky-200/70 font-semibold mt-0.5">Minutes</div>
                </div>
                <div class="bg-white/10 rounded-xl p-3 text-center">
                    <div class="text-2xl font-black">4/−1</div>
                    <div class="text-xs text-sky-200/70 font-semibold mt-0.5">Marking</div>
                </div>
            </div>
        </div>

        <!-- Name Entry -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-xl p-6 mb-4">
            <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-user text-medical-500 mr-2"></i>Your Name (for Leaderboard)</label>
            <input type="text" id="studentName" placeholder="Enter your name…" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-medical-400 bg-slate-50" maxlength="40">
        </div>

        <button id="startDailyBtn" class="shimmer-btn w-full bg-medical-500 hover:bg-medical-600 text-white font-extrabold py-4 rounded-2xl text-base shadow-xl shadow-medical-500/20 active:scale-95 transition-all">
            <i class="fa-solid fa-play mr-2"></i> Begin Daily Mock Test
        </button>
    </main>

    <!-- Exam Screen -->
    <main id="examScreen" class="hidden flex-1 max-w-3xl mx-auto px-4 sm:px-6 py-10 w-full">

        <div class="flex items-center justify-between mb-5">
            <span class="text-sm font-bold text-slate-600" id="dailyExamLabel">Daily Mock Test</span>
            <div class="flex items-center gap-3">
                <span class="text-sm font-extrabold text-emerald-600" id="liveScore">Score: 0</span>
                <div class="flex items-center gap-1.5 bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-bold" id="timerBox">
                    <i class="fa-regular fa-clock text-rose-500"></i>
                    <span id="countdownText" class="text-rose-500 font-extrabold">60:00</span>
                </div>
            </div>
        </div>

        <div class="w-full bg-slate-100 rounded-full h-2 mb-6">
            <div id="progressBar" class="bg-gradient-to-r from-medical-500 to-indigo-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>

        <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-2xl p-6 sm:p-8 text-white shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Q<span id="qNum">1</span> / <span id="qTotal">0</span></span>
                <span id="topicBadge" class="text-[10px] font-bold px-2.5 py-1 rounded-full bg-white/10 text-slate-300 uppercase tracking-wider"></span>
            </div>
            <p id="questionText" class="text-base sm:text-lg font-semibold leading-relaxed mb-6 min-h-[3rem]">Loading…</p>
            <div id="optionsBox" class="space-y-3"></div>
            <div id="feedbackBox" class="hidden mt-4 p-4 rounded-xl text-sm font-bold"></div>
            <div id="explanationBox" class="hidden mt-3 p-4 bg-white/5 rounded-xl text-sm text-slate-300 leading-relaxed"></div>
            <div class="flex gap-3 mt-5">
                <button id="showExplBtn" class="hidden flex-1 py-2.5 rounded-xl border border-white/20 text-white/70 text-sm font-bold hover:bg-white/10 transition-all">
                    <i class="fa-regular fa-lightbulb mr-1"></i> Explanation
                </button>
                <button id="nextBtn" class="hidden flex-1 shimmer-btn py-2.5 bg-medical-500 hover:bg-medical-600 text-white rounded-xl text-sm font-bold transition-all">
                    Next <i class="fa-solid fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>
        <div id="questionNav" class="mt-5 flex flex-wrap gap-2"></div>
    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { renderHeader, renderFooter, initSharedScripts } from './js/shared.js';
        import { db } from './js/firebase-config.js';
        import { doc, getDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        document.getElementById('header-root').innerHTML = renderHeader('Daily Test');
        document.getElementById('footer-root').innerHTML = renderFooter();
        initSharedScripts();

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('todayLabel').textContent = today;

        let allQuestions = [], currentIdx = 0, score = 0, answers = [];
        let countdown = 3600, timerInterval = null;

        const loadingScreen = document.getElementById('loadingScreen');
        const noTestScreen  = document.getElementById('noTestScreen');
        const lobbyScreen   = document.getElementById('lobbyScreen');
        const examScreen    = document.getElementById('examScreen');

        // ── Load daily test ────────────────────────────────────────────
        async function loadDailyTest() {
            try {
                const snap = await getDoc(doc(db, 'dailyTests', today));
                if (!snap.exists() || !snap.data().active) {
                    loadingScreen.classList.add('hidden');
                    noTestScreen.classList.remove('hidden');
                    return;
                }
                const testData = snap.data();
                countdown = testData.duration || 3600;

                document.getElementById('testTitle').textContent  = testData.title || 'CEE Daily Mock Test';
                document.getElementById('testDate').textContent   = `Date: ${today}`;
                document.getElementById('lobbyDuration').textContent = Math.floor(countdown / 60);

                // Load question IDs from the test
                const questionIds = testData.questions || [];
                document.getElementById('lobbyQCount').textContent = questionIds.length;

                // Fetch full question docs from Firestore
                // Questions stored as: subjects/{sub}/chapters/{chap}/questions/{id}
                // Daily test references them as "sub/chap/qid" strings
                const fetched = [];
                for (const ref of questionIds) {
                    const parts = ref.split('/');
                    if (parts.length === 3) {
                        const [sub, chap, qid] = parts;
                        const qSnap = await getDoc(doc(db, 'subjects', sub, 'chapters', chap, 'questions', qid));
                        if (qSnap.exists()) fetched.push({ id: qSnap.id, ...qSnap.data() });
                    }
                }

                allQuestions = fetched.sort(() => Math.random() - 0.5);

                loadingScreen.classList.add('hidden');
                lobbyScreen.classList.remove('hidden');

                document.getElementById('startDailyBtn').addEventListener('click', () => {
                    const name = document.getElementById('studentName').value.trim() || 'Anonymous';
                    localStorage.setItem('cee_name', name);
                    answers = new Array(allQuestions.length).fill(null);
                    score = 0; currentIdx = 0;

                    document.getElementById('qTotal').textContent = allQuestions.length;
                    document.getElementById('dailyExamLabel').textContent = testData.title;

                    lobbyScreen.classList.add('hidden');
                    examScreen.classList.remove('hidden');
                    buildNav();
                    startCountdown();
                    loadQuestion();
                });

            } catch (e) {
                loadingScreen.classList.add('hidden');
                noTestScreen.classList.remove('hidden');
            }
        }

        // ── Countdown Timer ─────────────────────────────────────────────
        function startCountdown() {
            timerInterval = setInterval(() => {
                countdown--;
                const m = String(Math.floor(countdown / 60)).padStart(2,'0');
                const s = String(countdown % 60).padStart(2,'0');
                document.getElementById('countdownText').textContent = `${m}:${s}`;
                if (countdown <= 300) {
                    document.getElementById('countdownText').classList.add('text-rose-400');
                }
                if (countdown <= 0) { clearInterval(timerInterval); finishExam(); }
            }, 1000);
        }

        // ── Load Question ───────────────────────────────────────────────
        function loadQuestion() {
            const q = allQuestions[currentIdx];
            document.getElementById('qNum').textContent = currentIdx + 1;
            document.getElementById('progressBar').style.width = `${((currentIdx+1)/allQuestions.length)*100}%`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('topicBadge').textContent = q.topic || q.difficulty || '';
            document.getElementById('feedbackBox').classList.add('hidden');
            document.getElementById('explanationBox').classList.add('hidden');
            document.getElementById('showExplBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('nextBtn').innerHTML = currentIdx < allQuestions.length - 1
                ? 'Next <i class="fa-solid fa-arrow-right ml-1"></i>'
                : 'Finish <i class="fa-solid fa-flag-checkered ml-1"></i>';

            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left bg-white/5 border border-white/10 p-3.5 rounded-xl text-sm font-semibold hover:bg-white/10 transition-all flex items-center justify-between group';
                btn.innerHTML = `<span>${opt}</span><span class="w-6 h-6 rounded-full border border-white/20 flex items-center justify-center text-xs">${String.fromCharCode(65+i)}</span>`;
                btn.onclick = () => selectOption(i);
                if (answers[currentIdx] !== null) { btn.disabled = true; highlightAnswer(q, i, btn, answers[currentIdx]); }
                optionsBox.appendChild(btn);
            });
        }

        function highlightAnswer(q, i, btn, chosen) {
            const correct = Number.isInteger(q.correct) ? q.correct : q.options.indexOf(q.answer);
            if (i === correct) btn.classList.add('correct');
            else if (i === chosen) btn.classList.add('wrong');
        }

        function selectOption(idx) {
            if (answers[currentIdx] !== null) return;
            answers[currentIdx] = idx;
            const q = allQuestions[currentIdx];
            const correct = Number.isInteger(q.correct) ? q.correct : q.options.indexOf(q.answer);
            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach((b, i) => {
                b.disabled = true;
                highlightAnswer(q, i, b, idx);
            });
            const isCorrect = idx === correct;
            score += isCorrect ? 4 : -1;
            const fb = document.getElementById('feedbackBox');
            fb.className = `p-4 rounded-xl text-sm font-bold ${isCorrect ? 'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/20' : 'bg-rose-500/10 text-rose-400 ring-1 ring-rose-500/20'}`;
            fb.innerHTML = isCorrect ? '<i class="fa-solid fa-check mr-2"></i>Correct! +4 marks' : `<i class="fa-solid fa-circle-exclamation mr-2"></i>Wrong! −1 mark. Correct: ${q.options[correct]}`;
            fb.classList.remove('hidden');
            document.getElementById('liveScore').textContent = `Score: ${score}`;
            if (q.explanation) {
                document.getElementById('explanationBox').textContent = q.explanation;
                document.getElementById('showExplBtn').classList.remove('hidden');
            }
            document.getElementById('nextBtn').classList.remove('hidden');
            updateNav();
        }

        document.getElementById('showExplBtn').addEventListener('click', () => document.getElementById('explanationBox').classList.toggle('hidden'));
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIdx < allQuestions.length - 1) { currentIdx++; loadQuestion(); }
            else finishExam();
        });

        function finishExam() {
            clearInterval(timerInterval);
            const correct = answers.filter((a, i) => { if (a===null) return false; const q=allQuestions[i]; return a===(Number.isInteger(q.correct)?q.correct:q.options.indexOf(q.answer)); }).length;
            const wrong   = answers.filter((a,i)=>{ if(a===null) return false; const q=allQuestions[i]; return a!==(Number.isInteger(q.correct)?q.correct:q.options.indexOf(q.answer)); }).length;
            const skipped = answers.filter(a=>a===null).length;
            const elapsed = (3600 - countdown);
            localStorage.setItem('cee_last_result', JSON.stringify({
                score, correct, wrong, skipped, total: allQuestions.length,
                timeSec: elapsed, subject: 'Daily Test', chapter: today, date: new Date().toISOString()
            }));
            window.location.href = 'result.html';
        }

        function buildNav() {
            const nav = document.getElementById('questionNav');
            nav.innerHTML = allQuestions.map((_,i)=>`<button class="qnav w-9 h-9 rounded-lg text-xs font-bold border-2 border-slate-200 bg-white text-slate-600 hover:border-medical-400 transition-all" data-i="${i}">${i+1}</button>`).join('');
            nav.querySelectorAll('.qnav').forEach(b=>b.addEventListener('click',()=>{currentIdx=parseInt(b.dataset.i);loadQuestion();}));
        }

        function updateNav() {
            document.querySelectorAll('.qnav').forEach((btn,i)=>{
                if(answers[i]!==null){
                    const q=allQuestions[i];const c=Number.isInteger(q.correct)?q.correct:q.options.indexOf(q.answer);
                    btn.className=`qnav w-9 h-9 rounded-lg text-xs font-bold border-2 transition-all ${answers[i]===c?'border-emerald-400 bg-emerald-50 text-emerald-700':'border-rose-400 bg-rose-50 text-rose-700'}`;
                }
            });
        }

        loadDailyTest();
    </script>
</body>
</html>
