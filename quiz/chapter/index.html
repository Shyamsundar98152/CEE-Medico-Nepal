<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEE Mock Test Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    .option-btn { transition: all 0.2s; }
    .option-btn.selected { background-color: #dbeafe; border-color: #3b82f6; }
    .marked { border-left: 5px solid #eab308; }
    .offline { background-color: #fef3c7; color: #92400e; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-blue-700">CEE Mock Test</h1>
      <div id="status" class="text-sm px-4 py-2 rounded-full bg-green-100 text-green-700 font-medium">Online</div>
    </div>

    <!-- LOGIN SECTION -->
    <div id="login-section" class="bg-white rounded-3xl shadow-xl p-10">
      <h2 class="text-3xl font-bold text-center mb-8">Student Login</h2>
      <input id="user-email" type="email" placeholder="Email" class="w-full px-5 py-4 border rounded-2xl mb-4">
      <input id="user-pass" type="password" placeholder="Password" class="w-full px-5 py-4 border rounded-2xl mb-6">
      <div class="grid grid-cols-3 gap-4">
        <button onclick="emailUserLogin()" class="bg-blue-600 text-white py-4 rounded-2xl font-semibold">Login</button>
        <button onclick="googleUserLogin()" class="bg-white border-2 border-gray-300 py-4 rounded-2xl font-semibold">Google</button>
        <button onclick="registerUser()" class="bg-emerald-600 text-white py-4 rounded-2xl font-semibold">Register</button>
      </div>
      <p id="user-error" class="text-red-600 text-center mt-6"></p>
      <button onclick="window.location.href='admin.html'" class="w-full mt-8 text-gray-500 hover:text-gray-700">Go to Admin Panel →</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
      <div class="bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold mb-2">Welcome, <span id="username" class="text-blue-600"></span></h2>
        
        <div class="mt-8">
          <select id="subject-select" onchange="loadChapters()" class="w-full p-4 border rounded-2xl text-lg mb-4">
            <option value="">Select Subject</option>
            <option value="mathematics">Mathematics</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
          </select>
          <select id="chapter-select" class="w-full p-4 border rounded-2xl text-lg">
            <option value="">Select Chapter</option>
          </select>
        </div>

        <button onclick="startExam()" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-semibold">
          Start Exam
        </button>

        <div class="grid grid-cols-2 gap-4 mt-6">
          <button onclick="showAnalytics()" class="py-4 bg-emerald-600 text-white rounded-2xl">Analytics</button>
          <button onclick="logoutUser()" class="py-4 bg-gray-600 text-white rounded-2xl">Logout</button>
        </div>
      </div>
    </div>

    <!-- EXAM AREA -->
    <div id="exam-area" class="hidden bg-white rounded-3xl shadow-xl p-8">
      <div class="flex justify-between mb-6">
        <div id="question-number" class="text-lg font-medium"></div>
        <div id="timer" class="text-2xl font-bold text-red-600"></div>
      </div>
      
      <div class="h-3 bg-gray-200 rounded-full mb-8">
        <div id="progress" class="h-3 bg-blue-600 rounded-full transition-all"></div>
      </div>

      <h2 id="question-text" class="text-xl leading-relaxed mb-8"></h2>
      <div id="options" class="space-y-4"></div>

      <div class="flex justify-between mt-10">
        <button onclick="prevQuestion()" class="px-8 py-3 border-2 rounded-2xl">← Previous</button>
        <button onclick="toggleMarkForReview()" id="mark-btn" class="px-8 py-3 border-2 border-yellow-500 text-yellow-600 rounded-2xl">Mark for Review</button>
        <button onclick="nextQuestion()" class="px-8 py-3 bg-blue-600 text-white rounded-2xl">Next →</button>
      </div>

      <button onclick="finishExamEarly()" class="mt-6 w-full bg-red-600 text-white py-4 rounded-2xl text-lg">Finish & Review</button>
    </div>

    <!-- REVIEW AREA -->
    <div id="review-area" class="hidden bg-white rounded-3xl shadow-xl p-8">
      <h2 class="text-3xl font-bold mb-6">Review Your Answers</h2>
      <div id="review-list" class="max-h-[520px] overflow-auto space-y-6 pr-4"></div>
      <div class="flex gap-4 mt-10">
        <button onclick="backToExam()" class="flex-1 py-5 border-2 rounded-2xl">Back to Exam</button>
        <button onclick="submitFinalExam()" class="flex-1 bg-green-600 text-white py-5 rounded-2xl">Submit Final Exam</button>
      </div>
    </div>

    <!-- ANALYTICS AREA -->
    <div id="analytics-area" class="hidden bg-white rounded-3xl shadow-xl p-8"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
      authDomain: "chapter-wise-backup.firebaseapp.com",
      projectId: "chapter-wise-backup",
      storageBucket: "chapter-wise-backup.firebasestorage.app",
      messagingSenderId: "864698641587",
      appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Enable Firestore Persistence
    db.enablePersistence({ synchronizeTabs: true })
      .then(() => console.log("Firestore Persistence Enabled"))
      .catch(err => console.warn("Persistence Error:", err.code));

    let currentUser = null, questions = [], currentIndex = 0, timerInterval;
    let userAnswers = {}, markedForReview = new Set();
    let selectedSubject = "", selectedChapter = "";

    const chaptersData = {
      mathematics: ["Algebra", "Trigonometry", "Calculus", "Geometry"],
      physics: ["Mechanics", "Thermodynamics", "Electromagnetism", "Optics"],
      chemistry: ["Organic Chemistry", "Inorganic Chemistry", "Physical Chemistry"],
      biology: ["Cell Biology", "Genetics", "Human Physiology"]
    };

    // Auth State
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('username').textContent = user.email.split('@')[0];
      }
    });

    function loadChapters() {
      selectedSubject = document.getElementById('subject-select').value;
      const chSelect = document.getElementById('chapter-select');
      chSelect.innerHTML = '<option value="">Select Chapter</option>';
      if (chaptersData[selectedSubject]) {
        chaptersData[selectedSubject].forEach(ch => {
          const opt = document.createElement('option');
          opt.value = ch.toLowerCase().replace(/\s+/g, '');
          opt.textContent = ch;
          chSelect.appendChild(opt);
        });
      }
    }

    async function startExam() {
      selectedChapter = document.getElementById('chapter-select').value;
      if (!selectedSubject || !selectedChapter) return alert("Please select subject and chapter");

      const path = `subjects/${selectedSubject}/chapters/${selectedChapter}/questions`;
      const snap = await db.collection(path).get();
      questions = snap.docs.map(d => d.data());

      userAnswers = {};
      markedForReview.clear();
      currentIndex = 0;

      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('exam-area').classList.remove('hidden');

      startTimer();
      showQuestion();
    }

    function startTimer() {
      let timeLeft = 1800;
      timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) finishExamEarly();
      }, 1000);
    }

    function showQuestion() {
      const q = questions[currentIndex];
      document.getElementById('question-number').textContent = `Question ${currentIndex + 1} / ${questions.length}`;
      document.getElementById('question-text').textContent = q.question;

      let html = '';
      q.options.forEach(opt => {
        const selected = userAnswers[currentIndex] === opt ? 'selected' : '';
        html += `<button onclick="selectAnswer('${opt}')" class="option-btn w-full p-6 text-left border-2 rounded-2xl text-lg ${selected}">${opt}</button>`;
      });
      document.getElementById('options').innerHTML = html;

      document.getElementById('progress').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
      document.getElementById('mark-btn').textContent = markedForReview.has(currentIndex) ? "Unmark" : "Mark for Review";
    }

    window.selectAnswer = (opt) => {
      userAnswers[currentIndex] = opt;
      showQuestion();
    };

    function toggleMarkForReview() {
      if (markedForReview.has(currentIndex)) markedForReview.delete(currentIndex);
      else markedForReview.add(currentIndex);
      showQuestion();
    }

    function nextQuestion() { if (currentIndex < questions.length - 1) { currentIndex++; showQuestion(); }}
    function prevQuestion() { if (currentIndex > 0) { currentIndex--; showQuestion(); }}

    function finishExamEarly() {
      clearInterval(timerInterval);
      showReviewScreen();
    }

    function showReviewScreen() {
      document.getElementById('exam-area').classList.add('hidden');
      document.getElementById('review-area').classList.remove('hidden');

      let html = '';
      questions.forEach((q, i) => {
        const ans = userAnswers[i] || "Not Answered";
        const mark = markedForReview.has(i) ? "🔖" : "";
        html += `
          <div class="p-6 border rounded-2xl ${markedForReview.has(i) ? 'marked' : ''}">
            <p class="font-medium">Q${i+1}: ${q.question}</p>
            <p class="mt-2">Your Answer: <strong>${ans}</strong> ${mark}</p>
          </div>`;
      });
      document.getElementById('review-list').innerHTML = html;
    }

    async function submitFinalExam() {
      clearInterval(timerInterval);
      let score = 0;
      questions.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });

      const result = {
        userId: currentUser.uid,
        email: currentUser.email,
        subject: selectedSubject,
        chapter: selectedChapter,
        score: score,
        total: questions.length,
        percentage: Math.round((score / questions.length) * 100),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      };

      await db.collection("results").add(result);
      alert(`✅ Exam Submitted!\nScore: ${score} / ${questions.length}`);
      showAnalytics();
    }

    async function showAnalytics() {
      document.getElementById('review-area').classList.add('hidden');
      document.getElementById('analytics-area').classList.remove('hidden');

      const snap = await db.collection("results").where("userId", "==", currentUser.uid).get();
      const data = snap.docs.map(d => d.data());

      let html = `<h2 class="text-3xl font-bold mb-6">Your Analytics</h2>`;
      html += `<p class="text-2xl">Total Exams: <strong>${data.length}</strong></p>`;
      document.getElementById('analytics-area').innerHTML = html + `<button onclick="location.reload()" class="mt-8 bg-blue-600 text-white px-10 py-4 rounded-2xl">Back to Home</button>`;
    }

    function backToExam() {
      document.getElementById('review-area').classList.add('hidden');
      document.getElementById('exam-area').classList.remove('hidden');
    }

    function logoutUser() { auth.signOut(); location.reload(); }

    // Login Functions
    async function emailUserLogin() {
      const email = document.getElementById('user-email').value;
      const pass = document.getElementById('user-pass').value;
      try { await auth.signInWithEmailAndPassword(email, pass); } 
      catch (e) { document.getElementById('user-error').textContent = e.message; }
    }

    async function googleUserLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try { await auth.signInWithPopup(provider); } 
      catch (e) { document.getElementById('user-error').textContent = e.message; }
    }

    async function registerUser() {
      const email = document.getElementById('user-email').value;
      const pass = document.getElementById('user-pass').value;
      try { 
        await auth.createUserWithEmailAndPassword(email, pass); 
        alert("Account created successfully!"); 
      } 
      catch (e) { document.getElementById('user-error').textContent = e.message; }
    }
  </script>
</body>
</html>
