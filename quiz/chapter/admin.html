<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - CEE Mock Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center text-blue-700 mb-8">Admin Panel</h1>

    <!-- Login Section -->
    <div id="login-section" class="bg-white rounded-3xl shadow-xl p-10 max-w-md mx-auto">
      <h2 class="text-3xl font-bold text-center mb-8">Admin Login</h2>
      <input id="admin-email" type="email" placeholder="Admin Email" class="w-full px-5 py-4 border rounded-2xl mb-4">
      <input id="admin-pass" type="password" placeholder="Password" class="w-full px-5 py-4 border rounded-2xl mb-6">
      <button onclick="emailAdminLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold mb-4">Login</button>
      <button onclick="googleAdminLogin()" class="w-full bg-white border-2 border-gray-300 py-4 rounded-2xl font-semibold">Google</button>
      <p id="admin-error" class="text-red-600 text-center mt-6"></p>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-semibold">Welcome, <span id="admin-name" class="text-blue-600"></span></h2>
        <button onclick="logoutAdmin()" class="bg-red-600 text-white px-6 py-3 rounded-2xl">Logout</button>
      </div>

      <!-- Upload Section -->
      <div class="bg-white rounded-3xl shadow-xl p-8 mb-8">
        <h3 class="text-xl font-semibold mb-4">Upload Questions</h3>
        <input type="file" id="json-files" multiple accept=".json" class="block w-full mb-6">
        
        <div class="grid grid-cols-2 gap-4">
          <select id="admin-subject" class="p-4 border rounded-2xl">
            <option value="mathematics">Mathematics</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
          </select>
          <input id="admin-chapter" type="text" placeholder="Chapter Name (e.g. algebra)" class="p-4 border rounded-2xl">
        </div>

        <button onclick="uploadQuestions()" class="mt-6 w-full bg-emerald-600 text-white py-4 rounded-2xl font-semibold">
          Upload JSON Files
        </button>
        <div id="upload-status" class="mt-4 text-sm"></div>
      </div>

      <!-- View Questions Section -->
      <div class="bg-white rounded-3xl shadow-xl p-8">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-semibold">View Questions</h3>
          <button onclick="loadQuestions()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm">Refresh</button>
        </div>
        
        <div id="questions-list" class="space-y-6 max-h-[600px] overflow-auto"></div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
      authDomain: "chapter-wise-backup.firebaseapp.com",
      projectId: "chapter-wise-backup",
      storageBucket: "chapter-wise-backup.firebasestorage.app",
      messagingSenderId: "864698641587",
      appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentAdmin = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentAdmin = user;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.remove('hidden');
        document.getElementById('admin-name').textContent = user.email;
        loadQuestions();
      }
    });

    // Login Functions
    async function emailAdminLogin() {
      const email = document.getElementById('admin-email').value;
      const pass = document.getElementById('admin-pass').value;
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (e) {
        document.getElementById('admin-error').textContent = e.message;
      }
    }

    async function googleAdminLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) {
        document.getElementById('admin-error').textContent = e.message;
      }
    }

    function logoutAdmin() {
      auth.signOut();
    }

    // ====================== UPLOAD ======================
    async function uploadQuestions() {
      const files = document.getElementById('json-files').files;
      const subject = document.getElementById('admin-subject').value;
      const chapter = document.getElementById('admin-chapter').value.trim().toLowerCase();
      const statusEl = document.getElementById('upload-status');

      if (!files.length || !chapter) {
        statusEl.innerHTML = `<span class="text-red-600">Please select files and enter chapter name</span>`;
        return;
      }

      statusEl.innerHTML = `Uploading ${files.length} file(s)...`;

      let success = 0;
      for (let file of files) {
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const collectionRef = db.collection(`subjects/${subject}/chapters/${chapter}/questions`);

          const batch = db.batch();
          data.forEach(q => {
            const docRef = collectionRef.doc();
            batch.set(docRef, q);
          });
          await batch.commit();
          success++;
        } catch (err) {
          console.error(err);
        }
      }

      statusEl.innerHTML = `<span class="text-emerald-600">✅ ${success} file(s) uploaded successfully!</span>`;
      loadQuestions();
    }

    // ====================== VIEW QUESTIONS ======================
    async function loadQuestions() {
      const subject = document.getElementById('admin-subject').value;
      const chapter = document.getElementById('admin-chapter').value.trim().toLowerCase() || "algebra";
      const container = document.getElementById('questions-list');

      try {
        const snap = await db.collection(`subjects/${subject}/chapters/${chapter}/questions`).get();
        
        if (snap.empty) {
          container.innerHTML = `<p class="text-gray-500 text-center py-10">No questions found in this chapter.</p>`;
          return;
        }

        let html = '';
        snap.forEach(doc => {
          const q = doc.data();
          html += `
            <div class="border border-gray-200 rounded-2xl p-6 bg-gray-50">
              <p class="font-medium text-lg mb-4">${q.question}</p>
              <div class="grid grid-cols-2 gap-3 text-sm mb-5">
                ${q.options.map(opt => `
                  <div class="p-3 bg-white rounded-xl border ${opt === q.answer ? 'border-green-500 bg-green-50' : ''}">
                    ${opt}
                  </div>`).join('')}
              </div>
              <div class="flex gap-4">
                <button onclick="editQuestion('${doc.id}', '${subject}', '${chapter}')" 
                        class="text-blue-600 hover:underline">Edit Question</button>
                <button onclick="deleteQuestion('${doc.id}', '${subject}', '${chapter}')" 
                        class="text-red-600 hover:underline">Delete</button>
              </div>
            </div>`;
        });

        container.innerHTML = html;
      } catch (error) {
        container.innerHTML = `<p class="text-red-600">Error loading questions: ${error.message}</p>`;
      }
    }

    // Edit Question
    async function editQuestion(docId, subject, chapter) {
      const newText = prompt("Edit the question text:");
      if (newText === null) return;

      try {
        await db.collection(`subjects/${subject}/chapters/${chapter}/questions`)
          .doc(docId)
          .update({ question: newText });
        alert("Question updated successfully!");
        loadQuestions();
      } catch (e) {
        alert("Error updating: " + e.message);
      }
    }

    // Delete Question
    async function deleteQuestion(docId, subject, chapter) {
      if (confirm("Are you sure you want to delete this question?")) {
        try {
          await db.collection(`subjects/${subject}/chapters/${chapter}/questions`).doc(docId).delete();
          loadQuestions();
        } catch (e) {
          alert("Error deleting: " + e.message);
        }
      }
    }
  </script>
</body>
</html>
