<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CeemedicoNepal Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#0f1115;color:#fff;padding:20px}
button{padding:10px 14px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.card{background:#1c2230;padding:15px;border-radius:10px;margin-top:10px}
pre{background:#000;padding:10px;border-radius:10px;overflow:auto;max-height:400px}
input{padding:10px;margin:5px;width:300px}
</style>
</head>

<body>

<h2>🔥 CeemedicoNepal Admin Panel</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input type="password" id="pass" placeholder="Admin Password"/>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="panel" style="display:none">

  <h3>📚 Chapter-wise Data</h3>
  <button onclick="loadSets()">Load Sets</button>
  <button onclick="loadStats()">Load Stats</button>

  <h3>🧪 Write Test Exam</h3>
  <input id="examKey" placeholder="exam_key"/>
  <button onclick="createExam()">Create Exam</button>

  <div class="card">
    <h4>Output</h4>
    <pre id="out">Waiting...</pre>
  </div>

</div>

<script>
/* =========================
   FIREBASE APPS (MULTI DB FIX)
========================= */

// Chapter-wise DB (READ)
const chapterApp = firebase.initializeApp({
  apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
  authDomain: "chapter-wise-backup.firebaseapp.com",
  databaseURL: "https://chapter-wise-backup-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chapter-wise-backup",
  storageBucket: "chapter-wise-backup.firebasestorage.app",
  messagingSenderId: "864698641587",
  appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
}, "chapter");

const chapterDB = chapterApp.database();


// NepalQuiz DB (WRITE + EXAM CONTROL)
const nepalApp = firebase.initializeApp({
  apiKey: "AIzaSyDI-O7KiPzKKAc94UBcy-EusldtOMD_ZbE",
  authDomain: "nepalquiz-7d444.firebaseapp.com",
  databaseURL: "https://nepalquiz-7d444-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nepalquiz-7d444",
  storageBucket: "nepalquiz-7d444.firebasestorage.app",
  messagingSenderId: "547865008194",
  appId: "1:547865008194:web:2ced7d26f3c4c5ecc275db"
}, "nepal");

const nepalDB = nepalApp.database();


/* =========================
   LOGIN
========================= */
const ADMIN_PASS = "admin123";

function login(){
  const p = document.getElementById("pass").value;
  if(p === ADMIN_PASS){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
  } else {
    alert("Wrong password");
  }
}


/* =========================
   LOAD QUESTION SETS
========================= */
async function loadSets(){
  try{
    const snap = await chapterDB.ref("question_sets").once("value");
    const data = snap.val();

    document.getElementById("out").textContent =
      JSON.stringify(data, null, 2);

  }catch(err){
    document.getElementById("out").textContent = "ERROR: " + err.message;
  }
}


/* =========================
   CREATE EXAM IN NEPALQUIZ
========================= */
async function createExam(){
  const key = document.getElementById("examKey").value || "demo_exam";

  const exam = {
    title: "Live Exam",
    active: true,
    createdAt: Date.now(),
    duration: 10800
  };

  await nepalDB.ref("exams/" + key).set(exam);

  document.getElementById("out").textContent =
    "Exam created in nepalquiz:\n" + JSON.stringify(exam, null, 2);
}


/* =========================
   BASIC STATS
========================= */
async function loadStats(){
  const snap = await chapterDB.ref("question_sets").once("value");
  const data = snap.val() || {};

  let sets = Object.keys(data).length;
  let questions = 0;

  Object.values(data).forEach(s=>{
    if(s.questions){
      questions += Array.isArray(s.questions)
        ? s.questions.length
        : Object.keys(s.questions).length;
    }
  });

  document.getElementById("out").textContent =
    `Sets: ${sets}\nQuestions: ${questions}`;
}
</script>

</body>
</html>
