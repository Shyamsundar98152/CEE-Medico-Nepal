<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile - CEE Medico Nepal</title>
<link rel="apple-touch-icon" sizes="180x180" href="/fevicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/fevicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/fevicon/favicon-16x16.png">
<link rel="manifest" href="/fevicon/site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--blue:#0062ff;--blue-dark:#0047cc;--blue-light:#e8f0ff;--green:#00c97a;--red:#ff3b5c;--bg:#f0f4ff;--card:#fff;--text:#0d1b2a;--muted:#6b7c93;--border:#dde5f0;--shadow:0 4px 24px rgba(0,98,255,0.09);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--blue);padding:0 24px;box-shadow:0 2px 16px rgba(0,98,255,0.18);position:sticky;top:0;z-index:100;}
nav{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo span{color:#fff;font-weight:800;font-size:1.05rem;}
.nav-links{display:flex;list-style:none;gap:4px;}
.nav-links a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:.85rem;font-weight:600;padding:8px 14px;border-radius:8px;transition:background .2s;}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,0.15);color:#fff;}
.hero{background:linear-gradient(135deg,#0062ff,#0047cc);padding:32px 24px 48px;text-align:center;}
.hero h1{color:#fff;font-size:1.6rem;font-weight:800;margin-bottom:6px;}
.hero p{color:rgba(255,255,255,0.78);font-size:.88rem;}
.main{max-width:700px;margin:-24px auto 40px;padding:0 16px;}
.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:28px;margin-bottom:20px;border:1px solid var(--border);}
.section-title{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-title i{color:var(--blue);}
.section-title::after{content:'';flex:1;height:2px;background:var(--border);}
.avatar-section{text-align:center;margin-bottom:24px;}
.avatar-large{width:96px;height:96px;border-radius:50%;background:var(--blue);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:2.5rem;font-weight:800;}
.avatar-large img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-weight:700;font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Sora',sans-serif;font-size:.9rem;transition:border .2s;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue);}
.form-group input:read-only{background:#f8f9fa;color:var(--muted);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn{padding:12px 24px;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-danger{background:#fff0f3;color:var(--red);border:2px solid #ffb3c1;}
.btn-danger:hover{background:#ffe0e6;}
.btn-row{display:flex;gap:12px;margin-top:24px;}
.success-msg{background:#f0fdf4;color:#16a34a;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none;}
.error-msg{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none;}
@media(max-width:768px){.nav-links{display:none;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo"><span>CEE Medico Nepal</span></a>
    <ul class="nav-links">
      <li><a href="/user-dashboard/index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
      <li><a href="/user-dashboard/practice-history.html"><i class="fas fa-history"></i> History</a></li>
      <li><a href="/user-dashboard/profile.html" class="active"><i class="fas fa-user"></i> Profile</a></li>
      <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
    </ul>
  </nav>
</header>

<div class="hero">
  <h1>My Profile</h1>
  <p>Manage your account information</p>
</div>

<div class="main">
  <div class="success-msg" id="successMsg"></div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="card">
    <div class="avatar-section">
      <div class="avatar-large" id="avatarLarge">?</div>
    </div>

    <form id="profileForm">
      <div class="form-group">
        <label>Email (cannot be changed)</label>
        <input type="email" id="email" readonly/>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Your full name"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="98XXXXXXXX"/>
        </div>
        <div class="form-group">
          <label>Target Year</label>
          <select id="targetYear">
            <option value="">Select</option>
            <option value="2082">CEE 2082</option>
            <option value="2083">CEE 2083</option>
            <option value="2084">CEE 2084</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>College / School</label>
        <input type="text" id="college" placeholder="Your institution"/>
      </div>

      <div class="form-group">
        <label>Account Status</label>
        <input type="text" id="accountStatus" readonly/>
      </div>

      <div class="form-group">
        <label>Member Since</label>
        <input type="text" id="memberSince" readonly/>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
        <button type="button" class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import {
  auth, db, signOut, onAuthStateChanged, updateProfile,
  ref, get, update, serverTimestamp
} from "../auth/firebase-init.js";

const form = document.getElementById("profileForm");
const successMsg = document.getElementById("successMsg");
const errorMsg = document.getElementById("errorMsg");

function showSuccess(msg) { successMsg.textContent = msg; successMsg.style.display = "block"; errorMsg.style.display = "none"; setTimeout(() => successMsg.style.display = "none", 4000); }
function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = "block"; successMsg.style.display = "none"; }

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "/auth/login.html"; return; }

  document.getElementById("email").value = user.email;
  document.getElementById("fullName").value = user.displayName || "";

  const initial = (user.displayName || user.email || "?")[0].toUpperCase();
  const avatar = document.getElementById("avatarLarge");
  if (user.photoURL) {
    avatar.innerHTML = `<img src="${user.photoURL}" alt="avatar">`;
  } else {
    avatar.textContent = initial;
  }

  const snap = await get(ref(db, `users/${user.uid}`));
  if (snap.exists()) {
    const data = snap.val();
    document.getElementById("phone").value = data.phone || "";
    document.getElementById("college").value = data.college || "";
    document.getElementById("targetYear").value = data.targetYear || "";
    document.getElementById("accountStatus").value = data.isApproved === false ? "Pending Approval" : "Active";
    if (data.createdAt) {
      document.getElementById("memberSince").value = new Date(data.createdAt).toLocaleDateString("en-NP", { month: "long", day: "numeric", year: "numeric" });
    }
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const user = auth.currentUser;
  if (!user) return;

  const fullName = document.getElementById("fullName").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const college = document.getElementById("college").value.trim();
  const targetYear = document.getElementById("targetYear").value;

  try {
    await updateProfile(user, { displayName: fullName });
    await update(ref(db, `users/${user.uid}`), {
      displayName: fullName,
      phone,
      college,
      targetYear,
      updatedAt: serverTimestamp()
    });
    showSuccess("Profile updated successfully!");
  } catch (err) {
    showError("Failed to update profile: " + err.message);
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "/auth/login.html";
});
</script>
</body>
</html>
