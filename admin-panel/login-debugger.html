<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supabase Login Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-8 bg-gray-100">

<div class="max-w-lg mx-auto bg-white p-8 rounded-3xl shadow">
    <h1 class="text-2xl font-bold mb-6">Supabase Login Debugger</h1>
    
    <input id="email" placeholder="Email" class="border p-3 w-full mb-3 rounded-xl">
    <input id="password" type="password" placeholder="Password" class="border p-3 w-full mb-6 rounded-xl">
    
    <div class="grid grid-cols-3 gap-3">
        <button onclick="signup()" class="bg-green-600 text-white py-3 rounded-xl">Sign Up</button>
        <button onclick="login()" class="bg-blue-600 text-white py-3 rounded-xl">Login</button>
        <button onclick="checkCurrentUser()" class="bg-purple-600 text-white py-3 rounded-xl">Check User ID</button>
    </div>

    <div id="msg" class="mt-6 p-4 bg-gray-100 rounded-2xl text-sm"></div>
</div>

<script>
const SUPABASE_URL = "https://rpudsnrqlhataqfavcjh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo";

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function msg(text, color = "black") {
    document.getElementById("msg").innerHTML = `<span style="color:${color}">${text}</span>`;
}

// Signup
async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    msg("Signing up...");
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) msg("Error: " + error.message, "red");
    else msg("Signup successful! Check email.", "green");
}

// Login
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    msg("Logging in...");
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) msg("Login Error: " + error.message, "red");
    else {
        msg("Login Success! User ID: " + data.user.id, "green");
        console.log("Current User:", data.user);
    }
}

// Check Current Logged-in User
async function checkCurrentUser() {
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error || !session) {
        msg("No active session. Please login first.", "red");
    } else {
        const userId = session.user.id;
        msg(`✅ Logged in as:<br><b>${session.user.email}</b><br><b>User ID:</b> ${userId}`, "green");
        console.log("Full User Object:", session.user);
        
        if (userId === "a15f22c0-3925-4c3f-b298-12e222503303") {
            msg("🎉 This is the Admin Account!", "green");
        } else {
            msg("⚠️ This is NOT the admin account.", "orange");
        }
    }
}
</script>
</body>
</html>
