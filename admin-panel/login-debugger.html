<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ExamPro Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="login" class="flex items-center justify-center h-screen">
  <div class="bg-white p-6 rounded-xl shadow w-96">
    <h2 class="text-xl font-bold mb-4">Admin Login</h2>

    <input id="email" class="w-full border p-2 mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full border p-2 mb-2" placeholder="Password">

    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">
      Login
    </button>

    <p id="msg" class="text-red-500 mt-2 text-sm"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-6">
  <h1 class="text-2xl font-bold">Admin Dashboard</h1>
  <p id="user"></p>
  <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 mt-4">
    Logout
  </button>
</div>

<script>
// ---------------- SUPABASE ----------------
const SUPABASE_URL = "https://rpudsnrqlhataqfavcjh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// IMPORTANT: change this to your real admin UUID
const ADMIN_ID = "a15f22c0-3925-4c3f-b298-12e222503303";

// ---------------- LOGIN ----------------
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  document.getElementById("msg").innerText = "Logging in...";

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  console.log("USER:", data.user);

  if (data.user.id === ADMIN_ID) {
    showDashboard(data.user);
  } else {
    document.getElementById("msg").innerText = "Not admin account!";
    await supabase.auth.signOut();
  }
}

// ---------------- DASHBOARD ----------------
function showDashboard(user) {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("user").innerText =
    "Logged in as: " + user.email;
}

// ---------------- LOGOUT ----------------
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// ---------------- AUTO LOGIN ----------------
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();

  if (session && session.user.id === ADMIN_ID) {
    showDashboard(session.user);
  }
}

checkSession();
</script>

</body>
</html>
