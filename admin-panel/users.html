    <!-- Pages -->
    <div id="dashboard" class="page p-8">Loading dashboard...</div>
    <div id="questions" class="page hidden p-8">Loading questions...</div>
    <div id="sessions" class="page hidden p-8">Loading sessions...</div>
    <div id="attempts" class="page hidden p-8">Loading attempts...</div>
    <div id="profiles" class="page hidden p-8">Loading profiles...</div>
    <div id="logs" class="page hidden p-8">Loading logs...</div>

</div>

<script>

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== AUTH ====================
async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    window.location.href = 'login.html'; // Create a separate login page
    return false;
  }
  document.getElementById('user-info').innerHTML = `
    <div class="flex items-center gap-3">
      <i class="fas fa-user-circle text-2xl"></i>
      <div>
        <p class="font-medium">${session.user.email}</p>
        <p class="text-xs text-gray-400">Admin</p>
      </div>
    </div>`;
  return true;
}

// ==================== REALTIME SUBSCRIPTIONS ====================
let subscriptions = [];

function subscribeToTable(table, renderFn) {
  const sub = supabase.channel(`public:${table}`)
    .on('postgres_changes', { event: '*', schema: 'public', table }, renderFn)
    .subscribe();
  subscriptions.push(sub);
}

// ==================== RENDER FUNCTIONS ====================
async function loadQuestions() {
  const { data, error } = await supabase.from('questions').select('*').order('created_at', { ascending: false });
  if (error) return console.error(error);

  let html = `
    <table class="w-full bg-white dark:bg-gray-900 rounded-2xl overflow-hidden">
      <thead class="bg-gray-100 dark:bg-gray-800">
        <tr><th class="p-4 text-left">Subject</th><th class="p-4 text-left">Chapter</th><th class="p-4 text-left">Question</th><th class="p-4 text-center">Actions</th></tr>
      </thead>
      <tbody class="text-sm">
  `;

  data.forEach(q => {
    html += `
      <tr class="border-t hover:bg-gray-50 dark:hover:bg-gray-800">
        <td class="p-4">${q.subject}</td>
        <td class="p-4">${q.chapter}</td>
        <td class="p-4">${q.question.substring(0, 80)}...</td>
        <td class="p-4 text-center">
          <button onclick="editQuestion('${q.id}')" class="text-blue-600 hover:underline mr-3">Edit</button>
          <button onclick="deleteItem('questions', '${q.id}')" class="text-red-600 hover:underline">Delete</button>
        </td>
      </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('questions').innerHTML = html;
}

async function loadSessions() {
  const { data } = await supabase.from('exam_sessions').select('*');
  // Similar table rendering logic...
  document.getElementById('sessions').innerHTML = `<p>Exam Sessions Loaded: ${data?.length || 0}</p>`;
  // Expand this similarly to questions
}

async function loadAttempts() { /* Similar */ }
async function loadProfiles() { /* Similar */ }
async function loadLogs() { /* Similar */ }

// ==================== CRUD ====================
async function deleteItem(table, id) {
  if (!confirm('Delete this item?')) return;
  const { error } = await supabase.from(table).delete().eq('id', id);
  if (error) alert(error.message);
}

// Add more CRUD functions as needed

function addNewItem() {
  const currentPage = document.querySelector('.page:not(.hidden)').id;
  alert(`Add new item to ${currentPage} - Form coming soon!`);
}

// ==================== PAGE NAVIGATION ====================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById(page).classList.remove('hidden');
  document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);

  if (page === 'questions') loadQuestions();
  if (page === 'sessions') loadSessions();
  if (page === 'attempts') loadAttempts();
  if (page === 'profiles') loadProfiles();
  if (page === 'logs') loadLogs();
}

async function logout() {
  await supabase.auth.signOut();
  window.location.href = 'login.html';
}

// ==================== INIT ====================
async function init() {
  const isAuth = await checkAuth();
  if (!isAuth) return;

  showPage('dashboard');

  // Subscribe to realtime changes
  subscribeToTable('questions', loadQuestions);
  subscribeToTable('exam_sessions', loadSessions);
  subscribeToTable('attempts', loadAttempts);
  subscribeToTable('profiles', loadProfiles);
  subscribeToTable('activity_logs', loadLogs);
}

init();
</script>

</body>
</html>
