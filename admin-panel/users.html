<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPro - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .nav-link { transition: all 0.2s; cursor: pointer; }
    .nav-link.active { background-color: #1e40af; color: white; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- LOGIN SCREEN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 to-gray-900">
  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-gray-800">ExamPro</h1>
      <p class="text-gray-500 mt-2">Administrator Login</p>
    </div>
    <div id="error-msg" class="hidden bg-red-100 text-red-700 p-3 rounded-2xl text-center mb-6 text-sm"></div>
    <form id="login-form" class="space-y-6">
      <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl">
      <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl">
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold">Login</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" class="hidden flex h-screen">
  <div class="w-72 bg-gray-900 text-white flex flex-col">
    <div class="p-6 border-b border-gray-800"><h1 class="text-2xl font-bold">ExamPro Admin</h1></div>
    <nav class="flex-1 p-4 space-y-1">
      <a onclick="showPage('dashboard', this)" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl active">Dashboard</a>
      <a onclick="showPage('questions', this)" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl">Questions</a>
      <a onclick="showPage('sessions', this)" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl">Sessions</a>
    </nav>
    <div class="p-4 border-t border-gray-800">
      <button onclick="logout()" class="w-full bg-red-600 py-3 rounded-xl font-medium">Logout</button>
    </div>
  </div>

  <div class="flex-1 overflow-auto p-8">
    <header class="flex justify-between items-center mb-8">
      <h2 id="page-title" class="text-3xl font-bold text-gray-800">Dashboard</h2>
    </header>

    <div id="dashboard" class="page active grid grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border">
        <h3 class="text-gray-500">Total Questions</h3>
        <p id="stat-questions" class="text-4xl font-bold mt-2">0</p>
      </div>
    </div>

    <div id="questions" class="page">
      <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
        <table class="w-full text-left">
          <thead class="bg-gray-50 border-b">
            <tr><th class="p-4">Question Text</th><th class="p-4">Difficulty</th></tr>
          </thead>
          <tbody id="questions-table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="sessions" class="page">
      <p class="text-gray-600">No active sessions found.</p>
    </div>
  </div>
</div>

<script>
const supabase = Supabase.createClient('https://rpudsnrqlhataqfavcjh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwdWRzbnJxbGhhdGFxZmF2Y2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzI0NjgsImV4cCI6MjA5NTU0ODQ2OH0.EEu5t-NPqWARChSAMpEvUPMBkz_JeeNe3bGSCQmH7Xo');

function showPage(pageId, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if(el) el.classList.add('active');
  document.getElementById('page-title').textContent = pageId.charAt(0).toUpperCase() + pageId.slice(1);
  if(pageId === 'questions') fetchQuestions();
}

async function fetchQuestions() {
  const { data } = await supabase.from('questions').select('*');
  const tbody = document.getElementById('questions-table-body');
  document.getElementById('stat-questions').textContent = data?.length || 0;
  tbody.innerHTML = data?.map(q => `
    <tr class="border-b"><td class="p-4">${q.question_text || 'Untitled'}</td><td class="p-4">${q.difficulty || 'N/A'}</td></tr>
  `).join('') || '<tr><td colspan="2" class="p-4 text-center">No data</td></tr>';
}

document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  });
  if(error) {
    const err = document.getElementById('error-msg');
    err.textContent = error.message;
    err.classList.remove('hidden');
  } else {
    location.reload();
  }
};

async function logout() { await supabase.auth.signOut(); location.reload(); }

(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if(session) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard-screen').classList.remove('hidden');
    fetchQuestions();
  }
})();
</script>
</body>
</html>
