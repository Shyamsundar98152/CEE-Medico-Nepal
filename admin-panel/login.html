<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Login / Signup</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Google Login</button>

<p id="msg"></p>

<script>
const SUPABASE_URL = "https://rpudsnrqlhataqfavcjh.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in → go dashboard
async function checkUser() {
  const { data: { user } } = await client.auth.getUser();
  if (user) window.location.href = "index.html";
}
checkUser();

// SIGNUP
async function signup() {
  const email = emailInput().email;
  const password = passInput().password;

  const { error } = await client.auth.signUp({
    email, password
  });

  msg(error ? error.message : "Signup successful! Check email.");
}

// LOGIN
async function login() {
  const email = emailInput().email;
  const password = passInput().password;

  const { error } = await client.auth.signInWithPassword({
    email, password
  });

  if (error) return msg.innerText = error.message;

  window.location.href = "index.html";
}

// GOOGLE LOGIN
async function googleLogin() {
  await client.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/index.html"
    }
  });
}

// helpers
function emailInput(){ return {email: document.getElementById("email").value}; }
function passInput(){ return {password: document.getElementById("password").value}; }
function msg(t){ document.getElementById("msg").innerText = t; }
</script>

</body>
</html>
