<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEE Daily Quiz | CEE Medico Nepal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050816; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-pulse { animation: pulse 2s infinite; background: #ef4444 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="glass sticky top-0 z-50 border-b border-white/10">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">CEEMedicoNepal</span>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-12">
        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Timer Section -->
            <div class="lg:col-span-2 glass rounded-3xl p-8 border border-white/10">
                <h1 id="todayDate" class="text-3xl font-bold mb-8">Loading Session...</h1>
                
                <div class="space-y-4 mb-8">
                    <div id="todaySubject" class="text-blue-400 font-semibold text-lg">---</div>
                    <div id="todayChapter" class="text-2xl font-bold">---</div>
                </div>

                <div id="countdownTimer" class="grid grid-cols-3 gap-4 mb-8">
                    <div class="text-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <div id="hours" class="text-2xl font-bold">00</div>
                        <div class="text-xs text-slate-500 uppercase">Hours</div>
                    </div>
                    <div class="text-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <div id="minutes" class="text-2xl font-bold">00</div>
                        <div class="text-xs text-slate-500 uppercase">Minutes</div>
                    </div>
                    <div class="text-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <div id="seconds" class="text-2xl font-bold">00</div>
                        <div class="text-xs text-slate-500 uppercase">Seconds</div>
                    </div>
                </div>

                <button id="startBtn" disabled class="w-full py-4 bg-slate-800 rounded-2xl font-bold transition duration-300">
                    WAITING FOR SESSION
                </button>
            </div>

            <!-- Future Schedule Sidebar -->
            <div class="glass rounded-3xl p-8 border border-white/10">
                <h2 class="text-xl font-bold mb-6 text-slate-300">90-Day Schedule</h2>
                <div id="scheduleList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                    <!-- Example entries -->
                    <div class="p-3 bg-white/5 rounded-lg border border-white/5">
                        <div class="text-xs text-blue-400">Day 1</div>
                        <div class="font-semibold">Human Physiology</div>
                    </div>
                    <div class="p-3 bg-white/5 rounded-lg border border-white/5">
                        <div class="text-xs text-blue-400">Day 2</div>
                        <div class="font-semibold">Cell Biology</div>
                    </div>
                    <div class="p-3 bg-white/5 rounded-lg border border-white/5">
                        <div class="text-xs text-blue-400">Day 3</div>
                        <div class="font-semibold">Organic Chemistry</div>
                    </div>
                    <!-- Add more days here -->
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
            authDomain: "chapter-wise-backup.firebaseapp.com",
            projectId: "chapter-wise-backup",
            storageBucket: "chapter-wise-backup.firebasestorage.app",
            messagingSenderId: "864698641587",
            appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        async function fetchLiveQuestions() {
            try {
                const snapshot = await getDocs(query(collection(db, 'questions'), limit(50)));
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (e) { console.error(e); return []; }
        }

        function updateTimer() {
            const hEl = document.getElementById("hours"), mEl = document.getElementById("minutes"), sEl = document.getElementById("seconds"), startBtn = document.getElementById("startBtn");
            if (!hEl || !mEl || !sEl) return;

            const now = new Date();
            const start = new Date(); start.setHours(11, 0, 0, 0);
            const end = new Date(); end.setHours(23, 0, 0, 0);

            if (now >= start && now < end) {
                hEl.innerText = "00"; mEl.innerText = "00"; sEl.innerText = "00";
                if (startBtn) {
                    startBtn.disabled = false;
                    startBtn.classList.add("active-pulse");
                    startBtn.textContent = "JOIN LIVE QUIZ NOW";
                    startBtn.onclick = async () => {
                        sessionStorage.setItem("currentQuiz", JSON.stringify(await fetchLiveQuestions()));
                        window.location.href = "regular-quiz.html";
                    };
                }
            } else {
                let diff = start - now;
                if (diff < 0) diff += 24 * 60 * 60 * 1000;
                hEl.innerText = String(Math.floor(diff / 3600000)).padStart(2, '0');
                mEl.innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                sEl.innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                if (startBtn) {
                    startBtn.disabled = true;
                    startBtn.classList.remove("active-pulse");
                    startBtn.textContent = "WAITING FOR SESSION";
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            setInterval(updateTimer, 1000);
            updateTimer();
        });
    </script>
</body>
</html>
