<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEE Exam System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

<div class="max-w-4xl mx-auto grid md:grid-cols-3 gap-6">
    <!-- Main Exam Area -->
    <div class="md:col-span-2 bg-gray-800 p-6 rounded-2xl shadow-xl">
        <h2 id="status" class="text-xl font-bold mb-4">Not Logged In</h2>
        <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">Login with Google</button>
        
        <div id="quizContainer" class="hidden mt-6">
            <h2 id="question" class="text-2xl font-semibold mb-6">Loading...</h2>
            <div id="options" class="space-y-3"></div>
            <p class="mt-6 text-yellow-400 font-mono text-xl">Time Left: <span id="time">30</span>s</p>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
        <h3 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">Leaderboard</h3>
        <div id="leaderboard" class="space-y-2 text-sm"></div>
        
        <h3 class="text-lg font-bold mt-8 mb-4 border-b border-gray-700 pb-2">Your Analytics</h3>
        <div id="analytics" class="text-sm">Please finish a test to see results.</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAng6y7NH9RZshoxEqaplOM9LiSMVrsmtI",
        authDomain: "cee-medico-nepal-regular.firebaseapp.com",
        databaseURL: "https://cee-medico-nepal-regular-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cee-medico-nepal-regular",
        storageBucket: "cee-medico-nepal-regular.firebasestorage.app",
        messagingSenderId: "568305810313",
        appId: "1:568305810313:web:ea50af6a7a1278d8f0bf58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let user = null;
    let timer = 30;
    let timerInterval;

    // Mock Questions - In production, fetch these from /questions path in DB
    const questions = [
        { q: "Which gas is most abundant in the atmosphere?", opts: ["Oxygen", "Nitrogen", "CO2"], ans: "Nitrogen" },
        { q: "What is the powerhouse of the cell?", opts: ["Nucleus", "Mitochondria", "Ribosome"], ans: "Mitochondria" }
    ];
    let qIdx = 0;
    let score = 0;

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

    onAuthStateChanged(auth, (u) => {
        if (u) {
            user = u;
            document.getElementById('status').innerText = `Welcome, ${u.displayName}`;
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('quizContainer').classList.remove('hidden');
            loadQuiz();
        }
    });

    function loadQuiz() {
        if (qIdx >= questions.length) return finishQuiz();
        
        const q = questions[qIdx];
        document.getElementById('question').innerText = q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        q.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left bg-gray-700 p-3 rounded-lg hover:bg-gray-600 transition";
            btn.innerText = o;
            btn.onclick = () => { if(o === q.ans) score++; next(); };
            optDiv.appendChild(btn);
        });
        
        timer = 30;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timer--;
            document.getElementById('time').innerText = timer;
            if(timer <= 0) next();
        }, 1000);
    }

    function next() {
        clearInterval(timerInterval);
        qIdx++;
        loadQuiz();
    }

    async function finishQuiz() {
        const resultRef = ref(db, 'testResults/' + user.uid);
        await push(resultRef, { score, timestamp: Date.now() });
        document.getElementById('quizContainer').innerHTML = `<h2 class="text-3xl text-green-400">Exam Finished! Score: ${score}/${questions.length}</h2>`;
        document.getElementById('analytics').innerText = score > questions.length/2 ? "Good Job!" : "Needs Improvement.";
    }

    // Load Leaderboard
    const leaderboardRef = query(ref(db, 'testResults'), limitToLast(10));
    onValue(leaderboardRef, (snapshot) => {
        const data = snapshot.val();
        document.getElementById('leaderboard').innerHTML = data ? Object.values(data).map(d => `<p>${d.score} pts</p>`).join('') : "No results yet.";
    });
</script>
</body>
</html>
