<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEE Daily Quiz | CEE Medico Nepal - MBBS MCQ Mock Test</title>
    <link rel="canonical" href="https://ceemediconepal.xyz/quiz.html" />
    <meta name="description" content="Prepare for CEE and MBBS entrance exams in Nepal with CEE Medico Nepal. Daily medical quizzes and MCQs designed for medical aspirants.">
    <meta name="keywords" content="CEE Medico Nepal, CEE Nepal, Medical Quiz Nepal, CEE Entrance Preparation, CEE Mock Test">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050816; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-white/10">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="https://ceemediconepal.xyz" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                CEEMedicoNepal
            </a>
            <div class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
                <a href="https://ceemediconepal.xyz" class="hover:text-white transition">Home</a>
                <a href="#" class="hover:text-white transition text-white">Quiz Dashboard</a>
                <a href="#" class="hover:text-white transition">Leaderboard</a>
            </div>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-12">
        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass rounded-3xl p-8 border border-white/10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">Upcoming Session</p>
                        <h1 id="todayDate" class="text-3xl font-bold mt-2">Loading...</h1>
                    </div>
                    <!-- Live Status Indicator -->
                    <div id="liveBadge" class="hidden items-center gap-2 px-3 py-1 rounded-full bg-green-500/10 text-green-400 text-xs font-bold border border-green-500/20">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        LIVE NOW
                    </div>
                    <div id="offlineBadge" class="flex items-center gap-2 px-3 py-1 rounded-full bg-red-500/10 text-red-400 text-xs font-bold border border-red-500/20">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                        OFFLINE
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <div id="todaySubject" class="text-blue-400 font-semibold text-lg">Loading...</div>
                    <div id="todayChapter" class="text-2xl font-bold">Loading...</div>
                </div>

                <div id="countdownTimer" class="grid grid-cols-3 gap-4 mb-8">
                    <div class="text-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <div id="hours" class="text-2xl font-bold">00</div>
                        <div class="text-xs text-slate-500">Hours</div>
                    </div>
                    <div class="text-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <div id="minutes" class="text-2xl font-bold">00</div>
                        <div class="text-xs text-slate-500">Minutes</div>
                    </div>
                    <div class="text-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <div id="seconds" class="text-2xl font-bold">00</div>
                        <div class="text-xs text-slate-500">Seconds</div>
                    </div>
                </div>

                <button id="startBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-bold hover:scale-[1.01] transition duration-300">
                    JOIN LIVE QUIZ
                </button>
            </div>

            <div class="glass rounded-3xl p-8 border border-white/10">
                <h2 class="text-xl font-bold mb-6">90-Day Schedule</h2>
                <div id="scheduleList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </main>

    <footer class="bg-black/20 py-12 border-t border-white/10">
        <div class="max-w-7xl mx-auto px-6 text-center text-slate-500 text-sm">
            <p class="font-bold text-white mb-4">CEE Medico Nepal</p>
            <p>&copy; 2026 CEEMedicoNepal. All Rights Reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({ projectId: "chapter-wise-backup" }));
        let groupedData = [];

        async function loadData() {
            const snapshot = await getDocs(collection(db, "questions"));
            const map = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                if (!data.subject || !data.chapter) return;
                const key = data.subject + "___" + data.chapter;
                if (!map[key]) map[key] = { subject: data.subject, chapter: data.chapter, count: 0 };
                map[key].count++;
            });
            groupedData = Object.values(map);
            generateSchedule();
        }

        function generateSchedule() {
            const today = new Date();
            groupedData.forEach((item, i) => {
                if (i >= 90) return;
                const div = document.createElement("div");
                div.className = "p-4 bg-slate-900 rounded-2xl border border-white/5 flex justify-between items-center";
                div.innerHTML = `<div><p class="font-bold text-sm">${item.chapter}</p></div><span class="px-2 py-1 bg-blue-500/20 text-blue-400 rounded-md text-[10px] font-bold">${item.count} Qs</span>`;
                document.getElementById("scheduleList").appendChild(div);
                if (i === 0) {
                    document.getElementById("todayDate").innerText = "Today's Session";
                    document.getElementById("todaySubject").innerText = item.subject;
                    document.getElementById("todayChapter").innerText = item.chapter;
                }
            });
        }

        function updateStatus() {
            const now = new Date();
            const hour = now.getHours();
            
            // To preview live mode, you can change this condition to 'true' or adjust the hour range.
            const isLive = (hour >= 11 && hour < 23); 

            if (isLive) {
                document.getElementById("liveBadge").classList.remove("hidden");
                document.getElementById("liveBadge").classList.add("flex");
                document.getElementById("offlineBadge").classList.add("hidden");
                document.getElementById("countdownTimer").classList.add("hidden");
            } else {
                document.getElementById("liveBadge").classList.add("hidden");
                document.getElementById("offlineBadge").classList.remove("hidden");
                document.getElementById("countdownTimer").classList.remove("hidden");
                
                // Countdown logic
                const target = new Date();
                target.setHours(22, 0, 0, 0);
                if (now > target) target.setDate(target.getDate() + 1);
                const diff = target - now;
                document.getElementById("hours").innerText = String(Math.floor(diff / 3600000)).padStart(2, '0');
                document.getElementById("minutes").innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                document.getElementById("seconds").innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            }
        }

        loadData();
        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
