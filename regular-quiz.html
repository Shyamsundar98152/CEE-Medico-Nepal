<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Subject → Chapter → MCQ Quiz</title>

<style>


body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.question-card{
  background:#1e293b;
  padding:20px;
  margin-top:20px;
  border-radius:12px;
}

.option{
  background:#334155;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}



body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  color:#38bdf8;
}

.section{
  margin-top:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  border:1px solid #334155;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.card h3{
  margin:0;
  color:#38bdf8;
}

.question-card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #334155;
}

.option{
  background:#334155;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:#475569;
}

.correct{
  background:green !important;
}

.wrong{
  background:red !important;
}

.hidden{
  display:none;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#0ea5e9;
  color:white;
  cursor:pointer;
}

.topbar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

</style>
</head>
<body>

<h1>CEE MCQ Platform</h1>

<div class="topbar">
  <button onclick="loadSubjects()">Reload Subjects</button>
</div>

<!-- SUBJECTS -->
<div id="subjectsSection" class="section">
  <h2>Subjects</h2>
  <div class="grid" id="subjectsGrid"></div>
</div>

<!-- CHAPTERS -->
<div id="chaptersSection" class="section hidden">
  <h2 id="chapterTitle">Chapters</h2>
  <div class="grid" id="chaptersGrid"></div>
</div>

<!-- QUESTIONS -->
<div id="questionsSection" class="section hidden">
  <h2 id="quizTitle">Quiz</h2>
  <div id="questionsContainer"></div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
  authDomain: "chapter-wise-backup.firebaseapp.com",
  databaseURL: "https://chapter-wise-backup-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chapter-wise-backup",
  storageBucket: "chapter-wise-backup.firebasestorage.app",
  messagingSenderId: "864698641587",
  appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// LOAD SUBJECTS
async function loadSubjects(){

  document.getElementById("subjectsGrid").innerHTML = "Loading...";

  const snapshot = await getDocs(collection(db, "questions"));

  const subjects = new Set();

  snapshot.forEach(doc => {
    const data = doc.data();

    if(data.subject){
      subjects.add(data.subject);
    }
  });

  const grid = document.getElementById("subjectsGrid");

  grid.innerHTML = "";

  subjects.forEach(subject => {

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `
      <h3>${subject}</h3>
      <p>Click to view chapters</p>
    `;

    card.onclick = () => loadChapters(subject);

    grid.appendChild(card);

  });

}


// LOAD CHAPTERS
async function loadChapters(subject){

  document.getElementById("chaptersSection")
    .classList.remove("hidden");

  document.getElementById("questionsSection")
    .classList.add("hidden");

  document.getElementById("chapterTitle")
    .innerText = `${subject} Chapters`;

  const q = query(
    collection(db, "questions"),
    where("subject", "==", subject)
  );

  const snapshot = await getDocs(q);

  const chapters = new Set();

  snapshot.forEach(doc => {

    const data = doc.data();

    if(data.chapter){
      chapters.add(data.chapter);
    }

  });

  const grid = document.getElementById("chaptersGrid");

  grid.innerHTML = "";

  chapters.forEach(chapter => {

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `
      <h3>${chapter}</h3>
      <p>Start MCQ Quiz</p>
    `;

    card.onclick = () => loadQuestions(subject, chapter);

    grid.appendChild(card);

  });

}


// LOAD QUESTIONS
async function loadQuestions(subject, chapter){

  document.getElementById("questionsSection")
    .classList.remove("hidden");

  document.getElementById("quizTitle")
    .innerText = `${subject} → ${chapter}`;

  const container =
    document.getElementById("questionsContainer");

  container.innerHTML = "Loading questions...";

  const q = query(
    collection(db, "questions"),
    where("subject", "==", subject),
    where("chapter", "==", chapter)
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){

    container.innerHTML = `
      <p>No questions found.</p>
    `;

    return;
  }

  container.innerHTML = "";

  let index = 1;

  snapshot.forEach(doc => {

    const data = doc.data();

    const card = document.createElement("div");

    card.className = "question-card";

    let optionsHTML = "";

    if(data.options){

      data.options.forEach(option => {

        optionsHTML += `
          <div class="option">
            ${option}
          </div>
        `;

      });

    }

    card.innerHTML = `
      <h3>Q${index}. ${data.question}</h3>
      ${optionsHTML}
    `;

    container.appendChild(card);

    index++;

  });

}


// AUTO LOAD
loadSubjects();

</script>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDD5xBrSkX_YXzSnsKxjW8-K6W4rBfV3rg",
  authDomain: "chapter-wise-backup.firebaseapp.com",
  databaseURL: "https://chapter-wise-backup-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chapter-wise-backup",
  storageBucket: "chapter-wise-backup.firebasestorage.app",
  messagingSenderId: "864698641587",
  appId: "1:864698641587:web:d0b550579c6eb7709ed4c6"
};


// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// =======================================
// SETTINGS
// =======================================

const QUIZ_START_HOUR = 22; // 10 PM Nepal Time
const QUIZ_END_HOUR = 23;   // 11 PM Nepal Time

const TIMEZONE = "Asia/Kathmandu";

const TOTAL_MONTHS = 3;


// =======================================
// GET NEPAL TIME
// =======================================

function getNepalDate(){

  return new Date(
    new Date().toLocaleString(
      "en-US",
      { timeZone: TIMEZONE }
    )
  );

}


// =======================================
// CHECK QUIZ TIME
// =======================================

function isQuizTime(){

  const now = getNepalDate();

  const hour = now.getHours();

  return hour >= QUIZ_START_HOUR &&
         hour < QUIZ_END_HOUR;

}


// =======================================
// SKIP SATURDAY
// =======================================

function isSaturday(){

  const now = getNepalDate();

  // Saturday = 6
  return now.getDay() === 6;

}


// =======================================
// GET DAY NUMBER
// =======================================

function getStudyDay(){

  const startDate =
    new Date("2026-06-01T00:00:00");

  const today = getNepalDate();

  const diff =
    today - startDate;

  const days =
    Math.floor(
      diff / (1000 * 60 * 60 * 24)
    );

  return days;

}


// =======================================
// LOAD TODAY CHAPTER
// =======================================

async function loadTodayQuiz(){

  const container =
    document.getElementById("quizContainer");

  // SATURDAY HOLIDAY
  if(isSaturday()){

    container.innerHTML = `
      <h2>
        Saturday Holiday
      </h2>

      <p>
        No MCQ today.
      </p>
    `;

    return;
  }

  // TIME CHECK
  if(!isQuizTime()){

    container.innerHTML = `
      <h2>
        Quiz Available
      </h2>

      <p>
        Daily MCQ opens from
        10:00 PM to 11:00 PM
        Nepal Time.
      </p>
    `;

    return;
  }

  try{

    // LOAD ALL QUESTIONS
    const snapshot =
      await getDocs(
        collection(db, "questions")
      );

    // GET UNIQUE CHAPTERS
    const chaptersMap = {};

    snapshot.forEach(doc => {

      const data = doc.data();

      if(
        data.subject &&
        data.chapter
      ){

        const key =
          `${data.subject}___${data.chapter}`;

        chaptersMap[key] = {
          subject: data.subject,
          chapter: data.chapter
        };

      }

    });

    const chapters =
      Object.values(chaptersMap);

    if(chapters.length === 0){

      container.innerHTML =
        "No chapters found.";

      return;
    }

    // DAY NUMBER
    const dayIndex =
      getStudyDay();

    // ROTATE CHAPTER DAILY
    const selected =
      chapters[
        dayIndex % chapters.length
      ];

    // QUERY QUESTIONS
    const q = query(
      collection(db, "questions"),
      where(
        "subject",
        "==",
        selected.subject
      ),
      where(
        "chapter",
        "==",
        selected.chapter
      )
    );

    const questionSnapshot =
      await getDocs(q);

    container.innerHTML = `
      <h2>
        Today's MCQ
      </h2>

      <h3>
        ${selected.subject}
      </h3>

      <p>
        Chapter:
        ${selected.chapter}
      </p>
    `;

    let count = 1;

    questionSnapshot.forEach(doc => {

      const data = doc.data();

      const card =
        document.createElement("div");

      card.className =
        "question-card";

      let optionsHTML = "";

      if(data.options){

        data.options.forEach(opt => {

          optionsHTML += `
            <div class="option">
              ${opt}
            </div>
          `;

        });

      }

      card.innerHTML = `
        <h3>
          Q${count}.
          ${data.question}
        </h3>

        ${optionsHTML}
      `;

      container.appendChild(card);

      count++;

    });

  } catch(error){

    console.error(error);

    container.innerHTML = `
      <p style="color:red;">
        ${error.message}
      </p>
    `;

  }

}


// =======================================
// AUTO START
// =======================================

loadTodayQuiz();

</script>



<div id="quizContainer"></div>





</body>
</html>
